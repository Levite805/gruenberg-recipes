/* ── UNIT CONVERTER ── */
const VOLUME_UNITS = {
  tsp: { label: 'tsp', factor: 4.92892 },
  tbsp: { label: 'tbsp', factor: 14.7868 },
  flOz: { label: 'fl oz', factor: 29.5735 },
  cup: { label: 'cup', factor: 236.588 },
  pint: { label: 'pint', factor: 473.176 },
  quart: { label: 'quart', factor: 946.353 },
  gallon: { label: 'gallon', factor: 3785.41 },
  mL: { label: 'mL', factor: 1 },
  L: { label: 'L', factor: 1000 },
};
const WEIGHT_UNITS = {
  oz: { label: 'oz', factor: 28.3495 },
  lb: { label: 'lb', factor: 453.592 },
  g: { label: 'g', factor: 1 },
  kg: { label: 'kg', factor: 1000 },
};
const TEMP_UNITS = {
  F: { label: '°F' },
  C: { label: '°C' },
};
const CONV_DEFAULTS = {
  volume: ['cup', 'mL'],
  weight: ['oz', 'g'],
  temp: ['F', 'C'],
};

function unitsForCategory(cat) {
  return cat === 'volume' ? VOLUME_UNITS : cat === 'weight' ? WEIGHT_UNITS : TEMP_UNITS;
}

function populateConvUnits() {
  const cat = document.getElementById('convCategory').value;
  const units = unitsForCategory(cat);
  const fromSel = document.getElementById('convFrom');
  const toSel = document.getElementById('convTo');
  fromSel.innerHTML = '';
  toSel.innerHTML = '';
  Object.entries(units).forEach(([key, u]) => {
    fromSel.appendChild(new Option(u.label, key));
    toSel.appendChild(new Option(u.label, key));
  });
  const [defFrom, defTo] = CONV_DEFAULTS[cat];
  fromSel.value = defFrom;
  toSel.value = defTo;
  computeConversion();
}

function roundNice(n) {
  if (!isFinite(n)) return '0';
  const rounded = Math.round(n * 1000) / 1000;
  return rounded.toString();
}

function convertTemp(val, from, to) {
  if (from === to) return val;
  const c = from === 'F' ? (val - 32) * 5 / 9 : val;
  return to === 'F' ? c * 9 / 5 + 32 : c;
}

function computeConversion() {
  const cat = document.getElementById('convCategory').value;
  const val = parseFloat(document.getElementById('convValue').value);
  const from = document.getElementById('convFrom').value;
  const to = document.getElementById('convTo').value;
  const units = unitsForCategory(cat);
  const result = document.getElementById('convResult');
  if (isNaN(val)) { result.textContent = '—'; return; }
  let out;
  if (cat === 'temp') {
    out = convertTemp(val, from, to);
  } else {
    out = val * units[from].factor / units[to].factor;
  }
  result.textContent = `${roundNice(val)} ${units[from].label} = ${roundNice(out)} ${units[to].label}`;
}

document.getElementById('convCategory').addEventListener('change', populateConvUnits);
document.getElementById('convValue').addEventListener('input', computeConversion);
document.getElementById('convFrom').addEventListener('change', computeConversion);
document.getElementById('convTo').addEventListener('change', computeConversion);
populateConvUnits();

/* ── SUBSTITUTIONS REFERENCE ── */

  { item: '1 cup sour cream', sub: '1 cup plain yogurt' },
  { item: '1 cup heavy cream (baking, not whipping)', sub: '3/4 cup milk + 1/3 cup melted butter' },
  { item: '1 egg (baking)', sub: '1/4 cup unsweetened applesauce, or 1 tbsp ground flaxseed + 3 tbsp water' },
  { item: '1 cup cake flour', sub: '1 cup all-purpose flour minus 2 tbsp, + 2 tbsp cornstarch' },
  { item: '1 cup self-rising flour', sub: '1 cup all-purpose flour + 1½ tsp baking powder + 1/4 tsp salt' },
  { item: '1 cup brown sugar', sub: '1 cup white sugar + 1 tbsp molasses' },
  { item: '1 tsp baking powder', sub: '1/4 tsp baking soda + 1/2 tsp cream of tartar' },
  { item: '1 cup buttermilk (yogurt version)', sub: '1 cup plain yogurt thinned with a splash of milk' },
  { item: '1 clove garlic', sub: '1/8 tsp garlic powder' },
  { item: '1 tbsp fresh herbs', sub: '1 tsp dried herbs' },
  { item: '1 cup mayonnaise', sub: '1 cup plain Greek yogurt' },
  { item: '1 cup ketchup', sub: '1 cup tomato sauce + 1/4 cup sugar + 2 tbsp vinegar' },
  { item: '1 cup white wine (cooking)', sub: '1 cup chicken or vegetable broth + 1 tbsp lemon juice' },
  { item: '1 tbsp cornstarch (thickener)', sub: '2 tbsp all-purpose flour' },
  { item: '1 cup vegetable oil (baking)', sub: '1 cup melted butter or unsweetened applesauce' },
  { item: '1 cup granulated sugar', sub: '1 cup honey or maple syrup, reduce other liquid by 1/4 cup' },
  { item: '1 tbsp fresh lemon juice', sub: '1/2 tbsp white vinegar' },
];

function renderSubList(filter) {
  const list = document.getElementById('subList');
  const q = (filter || '').trim().toLowerCase();
  const items = SUBSTITUTIONS.filter(s =>
    !q || s.item.toLowerCase().includes(q) || s.sub.toLowerCase().includes(q)
  );
  if (!items.length) {
    list.innerHTML = '<div class="sub-empty">No matching substitutions found.</div>';
    return;
  }
  list.innerHTML = items.map(s => `
    <div class="sub-item">
      <div class="sub-item-title">${s.item}</div>
      <div class="sub-item-swap">→ ${s.sub}</div>
    </div>
  `).join('');
}
document.getElementById('subSearch').addEventListener('input', e => renderSubList(e.target.value));
renderSubList('');

/* ── COOKING TIMER ── */
let timerIdCounter = 0;
const activeTimers = new Map();

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.35, 0.7].forEach(delay => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.value = 880;
      g.gain.setValueAtTime(0.0001, ctx.currentTime + delay);
      g.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + delay + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + delay + 0.28);
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime + delay);
      o.stop(ctx.currentTime + delay + 0.3);
    });
  } catch (e) { /* audio not available */ }
}

function formatTime(sec) {
  sec = Math.max(0, Math.round(sec));
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${s < 10 ? '0' : ''}${s}`;
}

function addTimer(minutes, label) {
  minutes = parseFloat(minutes);
  if (!minutes || minutes <= 0) return;
  const id = ++timerIdCounter;
  const totalSec = Math.round(minutes * 60);
  const timer = { id, remaining: totalSec, label: label || `${minutes} min timer`, done: false, intervalId: null };
  activeTimers.set(id, timer);
  renderTimers();
  timer.intervalId = setInterval(() => {
    timer.remaining -= 1;
    if (timer.remaining <= 0) {
      timer.remaining = 0;
      timer.done = true;
      clearInterval(timer.intervalId);
      beep();
    }
    updateTimerCard(timer);
  }, 1000);
}

function removeTimer(id) {
  const t = activeTimers.get(id);
  if (t && t.intervalId) clearInterval(t.intervalId);
  activeTimers.delete(id);
  renderTimers();
}

function renderTimers() {
  const list = document.getElementById('timerList');
  list.innerHTML = '';
  activeTimers.forEach(timer => list.appendChild(buildTimerCard(timer)));
}

function buildTimerCard(timer) {
  const card = document.createElement('div');
  card.className = 'timer-card' + (timer.done ? ' done' : '');
  card.id = 'timer-card-' + timer.id;
  card.innerHTML = `
    <div class="timer-card-info">
      <div class="timer-card-label">${timer.label}</div>
      <div class="timer-time">${formatTime(timer.remaining)}</div>
    </div>
    <div class="timer-card-actions">
      <button class="timer-btn" aria-label="Remove timer" title="Remove timer">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 1l12 12M13 1L1 13"/></svg>
      </button>
    </div>
  `;
  card.querySelector('.timer-btn').addEventListener('click', () => removeTimer(timer.id));
  return card;
}

function updateTimerCard(timer) {
  const card = document.getElementById('timer-card-' + timer.id);
  if (!card) return;
  card.classList.toggle('done', timer.done);
  card.querySelector('.timer-time').textContent = formatTime(timer.remaining);
}

document.querySelectorAll('.timer-preset-btn').forEach(btn => {
  btn.addEventListener('click', () => addTimer(btn.dataset.min, btn.dataset.min + ' min timer'));
});
document.getElementById('timerAddCustom').addEventListener('click', () => {
  const minInput = document.getElementById('timerCustomMin');
  const labelInput = document.getElementById('timerCustomLabel');
  addTimer(minInput.value, labelInput.value.trim());
  minInput.value = '';
  labelInput.value = '';
});

/* ── RECIPE SCALER ── */
const FRAC_TO_DEC = {
  '¼': 0.25, '½': 0.5, '¾': 0.75,
  '⅓': 1 / 3, '⅔': 2 / 3,
  '⅕': 0.2, '⅖': 0.4, '⅗': 0.6, '⅘': 0.8,
  '⅙': 1 / 6, '⅚': 5 / 6,
  '⅛': 0.125, '⅜': 0.375, '⅝': 0.625, '⅞': 0.875,
};
const DEC_TO_FRAC = [
  [1 / 8, '⅛'], [1 / 6, '⅙'], [0.2, '⅕'], [0.25, '¼'], [1 / 3, '⅓'],
  [0.375, '⅜'], [0.4, '⅖'], [0.5, '½'], [0.6, '⅗'], [0.625, '⅝'],
  [2 / 3, '⅔'], [0.75, '¾'], [0.8, '⅘'], [5 / 6, '⅚'], [0.875, '⅞'],
];
const FRAC_CHARS = Object.keys(FRAC_TO_DEC).join('');

function formatScaledQty(value) {
  if (!isFinite(value) || value <= 0) return '0';
  let whole = Math.floor(value + 1e-9);
  let rem = value - whole;
  if (rem < 0.03) return String(whole);
  if (1 - rem < 0.03) return String(whole + 1);
  let best = null, bestDiff = Infinity;
  for (const [dec, ch] of DEC_TO_FRAC) {
    const diff = Math.abs(dec - rem);
    if (diff < bestDiff) { bestDiff = diff; best = ch; }
  }
  if (bestDiff <= 0.04) {
    return whole > 0 ? `${whole} ${best}` : best;
  }
  const combined = whole + rem;
  return (Math.round(combined * 100) / 100).toString();
}

function scaleIngredientHTML(html, factor) {
  if (factor === 1) return html;
  const pattern = new RegExp(
    `(\\d+(?:\\.\\d+)?)\\s*\\/\\s*(\\d+)` +           // "1/2"
    `|(\\d+)\\s+([${FRAC_CHARS}])` +                    // "1 ½"
    `|(\\d+\\.\\d+)` +                                  // "1.5"
    `|([${FRAC_CHARS}])` +                              // "½"
    `|\\b(\\d+)\\b`,                                    // "2"
    'g'
  );
  return html.replace(pattern, (match, num1, den1, wholeNum, fracChar1, decNum, fracCharAlone, plainInt) => {
    let value;
    if (num1 !== undefined && den1 !== undefined) value = parseFloat(num1) / parseFloat(den1);
    else if (wholeNum !== undefined) value = parseFloat(wholeNum) + FRAC_TO_DEC[fracChar1];
    else if (decNum !== undefined) value = parseFloat(decNum);
    else if (fracCharAlone !== undefined) value = FRAC_TO_DEC[fracCharAlone];
    else if (plainInt !== undefined) value = parseFloat(plainInt);
    else return match;
    return formatScaledQty(value * factor);
  });
}

let scaleTargetLis = [];

function setupScaleBar() {
  const bar = document.getElementById('scaleBar');
  const content = document.getElementById('modalContent');
  const heading = Array.from(content.querySelectorAll('h1, h2, h3, h4'))
    .find(h => /ingredient/i.test(h.textContent));

  scaleTargetLis = [];
  if (heading) {
    let el = heading.nextElementSibling;
    while (el && !/^H[1-6]$/.test(el.tagName)) {
      if (el.tagName === 'UL' || el.tagName === 'OL') {
        scaleTargetLis.push(...el.querySelectorAll('li'));
      }
      el = el.nextElementSibling;
    }
  }

  if (scaleTargetLis.length) {
    scaleTargetLis.forEach(li => { li.dataset.orig = li.innerHTML; });
    bar.style.display = 'flex';
  } else {
    bar.style.display = 'none';
  }

  document.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.scale-btn[data-factor="1"]').classList.add('active');
  document.getElementById('scaleCustom').value = '';
}

function applyScale(factor) {
  scaleTargetLis.forEach(li => {
    li.innerHTML = scaleIngredientHTML(li.dataset.orig, factor);
  });
}

document.querySelectorAll('.scale-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('scaleCustom').value = '';
    applyScale(parseFloat(btn.dataset.factor));
  });
});
document.getElementById('scaleCustom').addEventListener('input', e => {
  const val = parseFloat(e.target.value);
  document.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('active'));
  if (!isNaN(val) && val > 0) applyScale(val);
});
</script>
