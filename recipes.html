s** of Mustard Seeds\n* **1 tsp** heaping of Celery Seed\n* **1 small jar (8 oz)** of minced garlic, drain juice and add\n\n#### Instructions\n1. Drain pickle juice out of 1 gallon jar.\n2. Add all ingredients and stir.\n3. Give it at least one day but stir it a few times.\n\n### For 1 Quart Jar of Pickles\n\n#### Ingredients\n* Sliced dill pickles (buy the sliced if available, if not they will need to be sliced)\n* **1 lb** of Sugar\n* **3** Cinnamon Sticks, medium to long length\n* **1 tbs** of Mustard Seeds or more if you like\n* **¼ tsp** heaping of Celery Seed\n* **¼ small jar** of minced garlic (from an 8 oz jar), drain juice and add, more or less depending on taste\n\n#### Instructions\n1. Drain pickle juice out of 1 quart jar.\n2. Add all ingredients and stir.\n3. Give it at least one day but stir it a few times."}, {"uuid": "6itwwes5vcbuyaudqpjlezn4ia", "title": "Moser's Carolina Sauce", "ainfo": "Moser's Carolina Sauce", "category": "sauces", "tags": [], "cookbook": false, "attribution": "", "preview": "¾ cup yellow mustard", "notes": "# Moser's Carolina Sauce\n\n### Ingredients\n* **¾ cup** yellow mustard\n* **½ cup** apple cider vinegar\n* **½ cup** honey\n* **1 tsp** Worcestershire sauce\n* **2 tbsp** ketchup\n* **1 tsp** garlic powder\n* **1 tbsp** red pepper flakes\n* **½ tsp** salt\n* **2 tbsp** brown sugar\n\n### Instructions\n1. Combine all ingredients in a saucepan.\n2. Cook over medium heat for 7 minutes, stirring occasionally."}, {"uuid": "vyb3fkqyypxyk3qqntmumhdgvy", "title": "Naan", "ainfo": "Homemade Naan (Urban Farmie Version)", "category": "mains", "tags": [], "cookbook": false, "attribution": "", "preview": "Warm water", "notes": "# Homemade Naan (Urban Farmie Version)\n\n### Ingredients\n* Sugar\n* Warm water\n* Yeast (Active dry or Instant)\n* Flour\n* Baking powder\n* Salt\n* Yogurt (Plain or Vegan)\n* Oil\n* Additional water (for brushing)\n* Melted butter, minced garlic, and chopped cilantro (optional, for serving)\n\n---\n\n### Instructions\n\n1. **Activate the Yeast:** Mix the sugar, warm water, and yeast together in a bowl. Let it sit in a warm place for about **10 minutes** until it becomes frothy. *(Note: If using instant yeast, you can skip this step and add it straight to the dry ingredients).*\n2. **Whisk Dry Ingredients:** In a separate bowl, add the salt and baking powder to your flour and give it a good whisk.\n3. **Form the Dough:** Add the yogurt and oil to the frothy yeast mixture, mixing with a fork first. Pour this liquid mixture into the flour. Use your hands or a food processor to combine everything until it forms a soft, pliable, and slightly sticky dough ball. **Do not overwork it!**\n4. **Let it Rise:** Place the dough ball inside a lightly oiled mixing bowl at least twice its size. Cover with a damp towel or plastic wrap and let it sit in a warm location to rise for **at least 1 hour** (it should roughly double in size). For even softer and fluffier naan, you can leave it out for up to **4 hours**.\n5. **Divide the Dough:** Once fully risen, gently divide the dough into **6 equal portions** (each should be roughly the size of a lemon).\n6. **Preheat the Skillet:** Heat a cast-iron skillet over medium-high heat. Let it get very warm—almost near smoking—while you begin rolling out your first piece of dough.\n7. **Roll the Naan:** Dust a dough ball with a little flour and roll it into a flatbread shape roughly **¼-inch thick**. Roll them out **one at a time** right before cooking. If the dough sticks to your rolling pin, dust with a bit more flour.\n8. **Season and Prep:** Pat any excess flour off the rolled dough. If adding seasonings like garlic or sesame seeds, press them firmly into one side. Turn the dough over and brush the non-seasoned side with a **thin film of water**.\n9. **Cook in Skillet:** Place the watered side of the naan directly onto the hot cast-iron skillet. Let it cook uncovered for about **5 seconds** until small bubbles appear on the surface. Immediately cover the skillet with a lid and cook for **45 seconds**.\n10. **Garnish and Serve:** Remove from the skillet and immediately brush with a thin layer of plain melted butter, or butter mixed with garlic and cilantro. Serve hot!\n\n---\n\n### Recipe Modifications & Substitutions\n\n* **For Yeast-Free Naan:** Skip the yeast activation step. Use self-raising flour and yogurt, or add 1 teaspoon of baking powder and ½ teaspoon of baking soda directly into regular flour.\n* **For Vegan Naan:** Substitute dairy yogurt and butter with plain vegan yogurt and plant-based butter."}, {"uuid": "etvcal4bhly5yjnpis43numdzy", "title": "Neapolitan Pizza Dough (12h Poolish Version)", "ainfo": "Neapolitan Pizza Dough (12h Poolish Version)", "category": "breads", "tags": [], "cookbook": false, "attribution": "", "preview": "Dough Balls: 10", "notes": "# Neapolitan Pizza Dough (12h Poolish Version)\n\n### Total Recipe Parameters\n* **Dough Balls:** 10\n* **Ball Weight:** 225g\n* **Water Hydration:** 70%\n* **Salt:** 3%\n* **Leavening:** 12 hours total at Room Temperature (78°F)\n* **Poolish Leavening:** 8 hours\n* **Poolish Flour Ratio:** 68%\n* **Yeast Type:** Active Dry Yeast (ADY)\n\n### Poolish Doses (1,772 g total)\n* **Flour:** 884 g\n* **Water:** 884 g\n* **Yeast:** 2.96 g\n\n### Main Dough Doses (478 g total)\n* **Flour:** 416 g\n* **Water:** 26 g\n* **Salt:** 39 g\n* **Yeast:** 0 g"}, {"uuid": "erxugfv6tbw4gg3dfpgjzhxcci", "title": "Neapolitan Pizza Dough (20h 70% Biga Version)", "ainfo": "Neapolitan Pizza Dough (20h 70% Biga Version)", "category": "breads", "tags": [], "cookbook": false, "attribution": "", "preview": "Dough Balls: 10", "notes": "# Neapolitan Pizza Dough (20h 70% Biga Version)\n\n### Total Recipe Parameters\n* **Dough Balls:** 10\n* **Ball Weight:** 225g\n* **Water Hydration:** 70%\n* **Salt:** 3%\n* **Leavening:** 20 hours at Room Temperature (78°F)\n* **Yeast Type:** Active Dry Yeast (ADY)\n* **Biga Flour Ratio:** 70%\n\n### Biga Doses (1,325 g total)\n* **Flour:** 910 g\n* **Water:** 410 g\n* **Yeast:** 4.92 g\n\n### Main Dough Doses (925 g total)\n* **Flour:** 390 g\n* **Water:** 501 g\n* **Salt:** 39 g\n* **Yeast:** 0 g"}, {"uuid": "uwazrj2wsrbz4aiv3ucl4z75gy", "title": "Neapolitan Pizza Dough (20h Biga Version)", "ainfo": "Neapolitan Pizza Dough (20h Biga Version)", "category": "breads", "tags": [], "cookbook": false, "attribution": "", "preview": "Dough Balls: 5", "notes": "# Neapolitan Pizza Dough (20h Biga Version)\n\n### Total Recipe Parameters\n* **Dough Balls:** 5\n* **Ball Weight:** 225g\n* **Water Hydration:** 80%\n* **Salt:** 3%\n* **Leavening:** 20 hours at Room Temperature (80°F)\n* **Yeast Type:** Active Dry Yeast (ADY)\n* **Biga Flour:** 100%\n\n### Biga Doses (895 g total)\n* **Flour:** 615 g\n* **Water:** 277 g\n* **Yeast:** 3.32 g\n\n### Main Dough Doses (230 g total)\n* **Flour:** 0 g\n* **Water:** 215 g\n* **Salt:** 18 g\n* **Yeast:** 0 g"}, {"uuid": "e7x4gtqmarhbvpix4fswqmq65y", "title": "Neapolitan Pizza Dough (48h Biga Version)", "ainfo": "Neapolitan Pizza Dough (48h Biga Version)", "category": "breads", "tags": [], "cookbook": false, "attribution": "", "preview": "Dough Balls: 5", "notes": "# Neapolitan Pizza Dough (48h Biga Version)\n\n### Total Recipe Parameters\n* **Dough Balls:** 5\n* **Ball Weight:** 225g\n* **Water Hydration:** 78%\n* **Salt:** 3%\n* **Leavening:** 48 hours at Room Temperature (80°F)\n* **Yeast Type:** Active Dry Yeast (ADY)\n* **Biga Flour:** 100%\n\n### Biga Doses (905 g total)\n* **Flour:** 622 g\n* **Water:** 280 g\n* **Yeast:** 3.36 g\n\n### Main Dough Doses (220 g total)\n* **Flour:** 0 g\n* **Water:** 205 g\n* **Salt:** 19 g\n* **Yeast:** 0 g"}, {"uuid": "og2rfu3oceitzkqe7qey3asgyu", "title": "No Mayo Cabbage Slaw", "ainfo": "No Mayo Cabbage Slaw", "category": "sides", "tags": [], "cookbook": false, "attribution": "", "preview": "½ cup apple cider vinegar", "notes": "# No Mayo Cabbage Slaw\n\n### Ingredients\n\n#### No Mayo Dressing\n* **½ cup** apple cider vinegar\n* **¾ cup** extra virgin olive oil\n* **2 tablespoons** honey\n* **2 teaspoons** whole celery seeds\n* **1 teaspoon** kosher salt\n* **1 teaspoon** black cracked pepper\n\n#### Slaw Mix\n* **2 cups** carrots (2 large carrots, shredded)\n* **2 cups** green cabbage, thinly sliced\n* **2 cups** purple cabbage, thinly sliced"}, {"uuid": "ffgwy2rmwuktb5oqvxvjp7mwm4", "title": "Oven fries", "ainfo": "Oven fries", "category": "sides", "tags": ["David Recipes"], "cookbook": false, "attribution": "", "preview": "2 russet potatoes, cut in ½ lengthwise, halves cut lengthwise into fourths to make 16 big, fat wedges", "notes": "# Oven fries\n\n### Ingredients\n* 2 russet potatoes, cut in ½ lengthwise, halves cut lengthwise into fourths to make 16 big, fat wedges\n* ¼ cup extra-virgin olive oil\n* ¾t Kosher salt\n* 2 tablespoons chopped parsley leaves\n* ¼ cup freshly grated Parmigiano-Reggiano\n\n### Instructions\n1. Preheat the oven to 425 degrees F.\n2. Preheat a baking sheet in the hot oven for at least 5 minutes.\n3. While the baking sheet is heating, toss the potatoes with the olive oil and 3/4 teaspoon salt in a large bowl.\n4. Then dump the potatoes out onto a baking sheet, spreading to a single layer.\n5. Roast for 30 to 35 minutes, shaking the pan every now and then, until the potatoes are cooked through, brown and crispy.\n6. Toss the fries in a big bowl with the parsley and cheese."}, {"uuid": "ttw6e27dhifpm3m22fsz7iwqti", "title": "Patchoulie Ginger Tea", "ainfo": "Philippines Ginger Lemon Tea", "category": "mains", "tags": [], "cookbook": false, "attribution": "", "preview": "1L of water", "notes": "# Philippines Ginger Lemon Tea\n\n### Ingredients\n* 1L of water\n* 5T of ginger punch\n* 1 whole lemon\n* 1 lemon grass broken\n* 4T honey\n\n### Instructions\n1. Take it to boil.\n2. Longer the better.\n3. Can reboil."}, {"uuid": "3xah4pw4igpwxvs53dgte55pvm", "title": "Peri Peri Chicken", "ainfo": "Peri Peri Chicken", "category": "mains", "tags": [], "cookbook": false, "attribution": "", "preview": "6 bone-in chicken thighs", "notes": "# Peri Peri Chicken\n\n### Ingredients\n* **6** bone-in chicken thighs\n* **2 tablespoons** olive oil\n* **1/2** lemon, juiced\n* **3 cloves** garlic, minced\n* **1 small** red chili, finely chopped\n* **1 tablespoon** brown sugar\n* **1 teaspoon** dried oregano\n* **1 teaspoon** sweet paprika\n* **1/4 teaspoon** cayenne pepper\n* **1/4 teaspoon** salt\n\n### Instructions\n1. In a food processor, add the olive oil, lemon juice, garlic, red chili, brown sugar, dried oregano, sweet paprika, cayenne pepper, and salt, and blend until smooth.\n2. Place the chicken in a bowl and cover with the marinade. Marinate for at least 10 minutes or overnight.\n3. Lightly oil a grill pan or preheat a charcoal grill to medium. Add the chicken and cook for 12 minutes, turning regularly, until it reaches an internal temperature of 165°F.\n4. *Alternative method:* Place the marinated chicken in a baking dish and bake for 30 minutes or until it reaches an internal temperature of 165°F."}, {"uuid": "7enaci7m2xygjipomk73k6qki4", "title": "Pina Colada", "ainfo": "Pina Colada", "category": "mains", "tags": [], "cookbook": false, "attribution": "", "preview": "2 ounces light rum", "notes": "# Pina Colada\n\n### Ingredients\n* **2 ounces** light rum\n* **1 ½ ounces** cream of coconut\n* **1 ½ ounces** pineapple juice\n* **½ ounce** lime juice, freshly squeezed\n* **Garnish:** pineapple wedge\n* **Garnish:** pineapple leaf\n\n### Steps\n1. Add the rum, cream of coconut and pineapple and lime juices to a shaker with ice and shake vigorously for 20 to 30 seconds.\n2. Strain into a chilled Hurricane glass over pebble ice.\n3. Garnish with a pineapple wedge and pineapple leaf."}, {"uuid": "34pck3ouuxpaodqtv2qt67pkke", "title": "Pizza Sauce", "ainfo": "Pizza Sauce (Ooni Version)", "category": "sauces", "tags": [], "cookbook": false, "attribution": "", "preview": "2 tbsp olive oil", "notes": "# Pizza Sauce (Ooni Version)\n\n### Ingredients\n* **2 tbsp** olive oil\n* **2** garlic cloves, crushed or finely chopped\n* **4 cups** (800g) canned whole plum tomatoes (preferably San Marzano)\n* **2 heaped tsp** sugar\n* **1 tsp** salt\n* **Handful** of basil leaves, roughly chopped\n* **Pinch** of freshly ground black pepper\n\n### Instructions\n1. Place the oil in a pan over a medium heat. When warm, add the garlic and fry until softened but not brown."}, {"uuid": "x6afqlfwbrfku43xlk526idzde", "title": "Pork Tenderloin", "ainfo": "Juicy and Tender Pork Tenderloin Roast", "category": "mains", "tags": [], "cookbook": false, "attribution": "", "preview": "2 pork tenderloins", "notes": "# Juicy and Tender Pork Tenderloin Roast\n\n### Ingredients\n* **2** pork tenderloins\n* **2 tablespoons** olive oil, divided\n* **1 teaspoon** sweet paprika\n* **1 teaspoon** garlic powder\n* **½ teaspoon** onion powder\n* **½ teaspoon** dried thyme\n* **½ teaspoon** dried rosemary\n* **Salt and fresh ground pepper**, to taste\n* **4 cloves** garlic, minced\n* **¼ cup** honey (omit if keto)\n* **1 tablespoon** Sriracha (or any hot sauce you like)\n* **3 tablespoons** low-sodium soy sauce (or coconut aminos for paleo)\n* **1 tablespoon** dijon mustard\n\n### Instructions\n1. Preheat your oven to 375°F (190°C). Line a baking dish with aluminum foil or parchment paper and set it aside. Pat dry the pork tenderloins with paper towels.\n2. In a small mixing bowl, combine paprika, garlic powder, onion powder, thyme, rosemary, salt, and pepper. Rub this spice mix all over the pork tenderloins.\n3. In a skillet, heat 1 tablespoon of olive oil over medium heat and sear the pork tenderloins until browned on all sides, about 3 to 5 minutes per side. Transfer the pork tenderloins to the prepared baking dish.\n4. In a bowl, combine the minced garlic, honey, soy sauce, mustard, Sriracha, and the remaining 1 tablespoon of olive oil; whisk until well combined. Brush this mixture over the pork tenderloins. Keep some of the mixture for serving.\n5. Roast the pork tenderloins for 15 minutes, then remove them from the oven.\n6. Tent a piece of foil over the pork tenderloins so the top doesn't burn, but the inside continues to cook. Put back in the oven and continue to cook for 15 more minutes, or until the internal temperature reaches 145°F (62°C).\n7. Remove from the oven and loosely cover with foil; allow to rest for 10 minutes. Slice and serve garnished with rosemary, orange slices, and the reserved glaze on the side.", "photos": ["pork-tenderloin.jpg"], "photo": "pork-tenderloin.jpg"}, {"uuid": "mh5hgxgony6hl6mvq7oitvv2ha", "title": "Potato Casserole", "ainfo": "Potato Casserole", "category": "sides", "tags": [], "cookbook": false, "attribution": "", "preview": "2 lbs. frozen hash brown (1/8-inch-thick – little cubes) – THAW", "notes": "# Potato Casserole\n\n### Ingredients\n* **2 lbs.** frozen hash brown (1/8-inch-thick – little cubes) – THAW\n* **1 stick** of butter\n* **1 teaspoon** of salt\n* **1 teaspoon** of pepper\n* **1 teaspoon** of garlic powder\n* **16 oz.** of sour cream\n* **1 can** of CONDENSED cream of chicken soup\n* **1 cup** of dry onion (more or less per personal taste)\n* **2 cups** of grated cheese (could use Mexican three cheese mix)\n* **3 or 4 cups** of Corn Flakes (or as much as you can cover the top) – CRUSH by hands\n* 9 x 13 non-stick baking pan or spray pan\n\n### Instructions\n1. Melt the butter in the microwave.\n2. Mix together well: melted butter, salt, pepper, garlic powder, sour cream, condensed cream of chicken soup, dry onion, cheese.\n3. Then mix hash browns in with the batch.\n4. Put in the 9 x 13 non-stick (or spray) baking pan.\n5. Melt ¼ stick of butter and pour over the top.\n6. Crush by hand the Corn Flakes and spread on top.\n7. Bake 350°F for 45 minutes to 1 hour (UNCOVERED) – **Do not cover while baking**.\n\n**Option:** Before eating, you can broil a few minutes to brown the top for a crunchier finish."}, {"uuid": "qiqgozftsjedloz2jrso5pw2ja", "title": "Potato Stacks (Potato Pavé)", "ainfo": "Potato Stacks (Potato Pavé)", "category": "sides", "tags": [], "cookbook": false, "attribution": "", "preview": "3 peeled russet potatoes", "notes": "# Potato Stacks (Potato Pavé)\n\n### Ingredients\n\n#### First Stage (Bake & Press)\n* **3** peeled russet potatoes\n* **¾ cup** heavy cream\n* **Nutmeg** (to taste)\n* **Clarified butter**\n* **Salt and finely ground black pepper**\n\n#### Second Stage (Sauté)\n* **2 tablespoons** vegetable oil\n* **3 tablespoons** butter\n* **Some sprigs** of thyme\n* **4 cloves** of garlic\n* **Salt and pepper**\n* **Chopped thyme**\n\n### Instructions\n1. **First Stage:** Cut the potatoes extremely thin. Layer them in a dish with the cream, nutmeg, clarified butter, salt, and black pepper (similar to a potato gratin). Bake at 350°F / 180°C for 90 minutes. Once baked, weight the dish down to compress it and let it cool in the refrigerator overnight.\n2. **Second Stage:** Cut the compressed potato terrine into uniform squares or slices. Sauté the squares in vegetable oil and butter along with sprigs of thyme and garlic cloves. Season with additional salt, pepper, and chopped thyme until crisp and golden brown on all sides."}, {"uuid": "bqq7wpmnba6da6ooh7qv3vnpiq", "title": "Restaurant-Style Spanish Rice", "ainfo": "Restaurant-Style Spanish Rice", "category": "sides", "tags": [], "cookbook": false, "attribution": "", "preview": "2 tablespoons vegetable oil", "notes": "# Restaurant-Style Spanish Rice\n\n### Ingredients\n* **2 tablespoons** vegetable oil\n* **2 cups** long-grain white rice\n* **1 cube** chicken-flavored bouillon\n* **4 cups** water (or 4 cups lower-sodium chicken broth, omitting the bouillon)\n* **1 (8-ounce) can** tomato sauce\n* **1 teaspoon** minced garlic\n* **1 teaspoon** salt\n* **1 teaspoon** ground cumin\n* **Dash** garlic pepper\n* **Chopped fresh cilantro** (optional, for topping)\n\n### Instructions\n1. Heat oil in a large frying pan over medium heat.\n2. Add rice and cook, stirring until golden brown, about 5 minutes.\n3. Combine bouillon and water in a microwave-safe container and microwave for 3 minutes.\n4. When rice is brown, add bouillon mixture, tomato sauce, salt, garlic, cumin, and garlic pepper to the pan.\n5. Stir and cover the pan. Let simmer for 30–40 minutes, stirring occasionally, until all is cooked and there is no liquid left. Fluff before serving and top with cilantro if desired."}, {"uuid": "uqfibxhee4nrnju7qlgbayhl4i", "title": "Roasted Balsamic Baby Carrots", "ainfo": "Roasted Balsamic Baby Carrots", "category": "sides", "tags": [], "cookbook": false, "attribution": "", "preview": "¼ cup balsamic vinegar", "notes": "# Roasted Balsamic Baby Carrots\n\n### Ingredients\n* **¼ cup** balsamic vinegar\n* **¼ cup** extra-virgin olive oil\n* **2 tbsp.** maple syrup\n* **½ tsp.** crushed red pepper flakes\n* **1½ lb.** baby carrots\n* Kosher salt\n* Freshly ground black pepper\n* Freshly chopped parsley, for serving\n\n### Instructions\n1. Preheat oven to 400°F. In a large bowl, combine vinegar, oil, syrup, and red pepper flakes. Add carrots, season with salt and pepper, and toss to coat. Place carrots on a large baking sheet, being sure not to overcrowd.\n2. Roast until carrots are fork-tender and slightly charred, about 30 minutes.\n3. Garnish with parsley to serve."}, {"uuid": "4przp7nzxpkoyxxzps5asqflxi", "title": "Sesame Crusted Tuna Steak", "ainfo": "Sesame Crusted Tuna Steak", "category": "asian", "tags": ["David Recipes"], "cookbook": false, "attribution": "", "preview": "2 Tablespoons soy sauce", "notes": "# Sesame Crusted Tuna Steak\n\n### Ingredients\n\n#### Grilled Tuna Steak Marinade\n* **2 Tablespoons** soy sauce\n* **1 Tablespoon** rice wine mirin\n* **1 Tablespoon** honey\n* Juice and zest of **1** lime\n* **1 teaspoon** sesame oil\n* **½ teaspoon** cayenne pepper\n* Tuna steaks\n\n#### Sesame Crust\n* **¼ cup** white sesame seeds\n* **¼ cup** black sesame seeds\n\n#### Dipping Sauce\n* **3 tablespoons** soy sauce\n* **1 tablespoon** unseasoned rice vinegar\n* **1 teaspoon** honey\n* **1 tablespoon** toasted sesame oil\n* **2 teaspoons** finely grated fresh ginger\n* **1 teaspoon** minced fresh garlic\n\n### Instructions\n1. Whisk together all the marinade ingredients in a dish, add the tuna steaks, and let marinate.\n2. Combine the white and black sesame seeds on a plate. Remove the tuna from the marinade and press firmly into the seeds to create an even crust on all sides.\n3. Sear or grill the tuna steaks quickly to your desired doneness.\n4. Whisk together all dipping sauce ingredients in a small bowl and serve alongside the sliced tuna."}, {"uuid": "fzcurcgsjteofnw5dlt2jxnude", "title": "Shredded Red Chili Chicken (Liz)", "ainfo": "Shredded Red Chili Chicken", "category": "mains", "tags": [], "cookbook": false, "attribution": "", "preview": "Garlic (for boiling)", "notes": "# Shredded Red Chili Chicken\n\n### Ingredients\n* Chicken\n* Water\n* Garlic (for boiling)\n* Salt (for boiling)\n* Chili powder\n* Cumin (optional, to taste)\n* Oil\n* Flour\n\n### Instructions\n1. Boil the chicken in water with garlic and salt.\n2. When the chicken is done, remove it and save the chicken broth. Shred the chicken meat.\n3. In a bowl, combine the chili powder with some of the chicken broth. If using cumin, add a little to the chili powder mixture.\n4. In a separate pan, combine oil and flour to create a thickening base.\n5. Pour the chili powder and broth mixture into the pan with the flour and oil, stirring continuously until the sauce thickens up.\n6. Place the shredded chicken inside the red chili sauce and mix until combined."}, {"uuid": "boeavtakerxz6fubf7zre5q3sq", "title": "Smoked Beef Ribs", "ainfo": "Smoked Beef Ribs", "category": "smoked", "tags": ["David Recipes"], "cookbook": false, "attribution": "", "preview": "Olive oil (used as a binder)", "notes": "# Smoked Beef Ribs\n\n### Ingredients\n* Ribs\n* Salt\n* Pepper\n* Garlic\n* Paprika\n* Olive oil (used as a binder)\n* BBQ Sauce\n\n### Instructions\n1. Apply olive oil to the ribs as a binder, then season with salt, pepper, garlic, and paprika.\n2. Smoke at 275°F for 2.5 hours.\n3. Wrap the ribs in butcher paper and cook for another 0.5 hours.\n4. Unwrap the ribs, apply BBQ sauce, and cook for a final 0.5 hours.\n5. Pull the ribs when they pass the bend test (approximately 199°F internal temperature)."}, {"uuid": "skferjipakc4qwlsailvfqtrxq", "title": "Smoked Brisket", "ainfo": "Smoked Brisket", "category": "smoked", "tags": ["David Recipes"], "cookbook": false, "attribution": "", "preview": "3T sea salt", "notes": "# Smoked Brisket\n\n### Rub\n* 3T sea salt\n* 6T coarse black pepper\n* 2T garlic powder\n* 2t onion powder\n* 1t white pepper\n* 1T smoked paprika\n* 1t sweet paprika\n* 1t cayenne\n* ½t ground cumin\n* 1t cinnamon\n* ½t oregano and thyme\n* 8T brown sugar\n\n### Trim\n* Remove meat less than width of thumb on flat\n* Trim the hard fat\n* Trim fat cap to ½ inch\n* Trim any fly away pieces\n\n### Apply Rub\n* At least 2 hours before cook, preferably longer\n* Use 1t of olive oil per side as a binder. Sprinkle rub liberally\n* Place back in fridge\n\n### Cook\n1. Preheat smoker to 180-225°F.\n2. Place fat side up. Smoke until fat starts to render/doesn't bounce, dark bark is set (~170-180°F IT / ~9-10 hrs).\n3. Foil boat fat side down with a thin layer of wagyu tallow on bottom.\n4. Increase temp to 225 or 250°F.\n5. Wait for 198°F IT on flat and check for probe tender.\n6. Continue smoking until probe tender (~202-204°F IT).\n7. Pull and rest in cooler, loose foil top, for 4 hours or more.", "photos": ["smoked-brisket-3.jpg", "smoked-brisket.jpg", "smoked-brisket-2.jpg"], "photo": "smoked-brisket-3.jpg"}, {"uuid": "ugkdaffp6ztg7ffg6coua7du74", "title": "Smoked Burgers", "ainfo": "Smoked Burgers", "category": "smoked", "tags": ["David Recipes"], "cookbook": false, "attribution": "", "preview": "Olive oil", "notes": "# Smoked Burgers\n\n### Ingredients\n* Olive oil\n* Garlic\n* Holy Cow seasoning\n* 80/20 ground chuck\n\n### Instructions\n1. Make the 80/20 ground chuck into patties and season with Holy Cow seasoning.\n2. Heat the smoker to 225°F.\n3. Cook the patties for 45 minutes, or until the internal temperature reaches 135°F (approximately 1 hour total).\n4. Pull the patties off and heat the smoker up to 400°F, opening the burn plate.\n5. Sear the patties for 2 minutes on each side.", "photos": ["smoked-burgers.jpg"], "photo": "smoked-burgers.jpg"}, {"uuid": "qyppkx65pra7lxiur7smnwds7e", "title": "Smoked Chicken with Alabama White Sauce", "ainfo": "Smoked Chicken with Alabama White Sauce", "category": "smoked", "tags": ["David Recipes"], "cookbook": false, "attribution": "", "preview": "4 cups mayo", "notes": "# Smoked Chicken with Alabama White Sauce\n\n### Ingredients\n\n#### White Alabama Sauce\n* **4 cups** mayo\n* **3** lemons\n* **4T** Worcestershire\n* **2T** white vinegar\n* **3T** hot sauce\n* **2T** salt\n* **4T** Dijon mustard\n* **4T** brown sugar\n* **1T** onion powder\n* **1T** black pepper\n* **3T** honey\n\n#### For the Chicken\n* Chicken\n* Salt (for dry brine)\n* BBQ rub\n\n### Instructions\n1. Spatchcock the chicken and dry brine it with salt overnight in the refrigerator.\n2. Apply your BBQ rub liberally over the chicken.\n3. Smoke at 375°F until the internal temperature reaches 160°F.\n4. Remove the chicken and dunk it completely in the Alabama white sauce before serving."}, {"uuid": "c6my3ajoikjbb6kfgsscf4ougi", "title": "Smoked Chuck Roast Pulled Beef", "ainfo": "Smoked Chuck Roast Pulled Beef", "category": "smoked", "tags": ["David Recipes"], "cookbook": false, "attribution": "", "preview": "Chuck Roast", "notes": "# Smoked Chuck Roast Pulled Beef\n\n### Ingredients\n* Chuck Roast\n* 1 onion sliced\n* 1 onion diced\n* 1 carrot sliced\n* 3 small peppers sliced\n* 4 cups beef stock\n* SPG seasoning\n* Wagyu tallow\n\n### Instructions\n1. Apply seasoning night before.\n2. Preheat smoker to 225°F, place fat side up for 3 hours. Spritz with beef stock every hour. Put 3 scoops of tallow to smoke. Include smoke tube.\n3. Place veggies in the bottom of a pan, add 2-3 cups of broth. Place roast on top. Increase temp to 250°F.\n4. Smoke for ~3 more hours (165°F IT), then pour tallow over, then wrap with aluminum foil over the top of the aluminum pan. Increase temp to 265°F.\n5. Cook until 202°F IT or probe tender. Rest for 15 minutes.\n6. Pour juice into fat separator. Shred meat outside of pan. Place shredded meat back into pan and pour separated fat over the top."}, {"uuid": "enlnup6khf6n3fzeatdznlvsfm", "title": "Smoked Pineapple", "ainfo": "Smoked Pineapple", "category": "smoked", "tags": ["David Recipes"], "cookbook": false, "attribution": "", "preview": "1 whole pineapple (smell for sweet bottom)", "notes": "# Smoked Pineapple\n\n### Ingredients\n* **1** whole pineapple (smell for sweet bottom)\n* **1t** cinnamon\n* **1t** brown sugar (optional)\n\n### Instructions\n1. Preheat to 225°F. Cut pineapple in half lengthwise including leaves and apply cinnamon on top.\n2. Place face down for 30 minutes and flip.\n3. Cook for another 30-45 minutes.\n4. Pull and let cool. Cut into watermelon slices."}, {"uuid": "5hozobanp6djhrjlt4mjwc4ree", "title": "Smoked Pulled Pork", "ainfo": "Smoked Pork Butt", "category": "smoked", "tags": ["David Recipes"], "cookbook": false, "attribution": "", "preview": "Pork butt", "notes": "# Smoked Pork Butt\n\n### Ingredients\n* Pork butt\n* Salt (for prepping)\n* Apple cider vinegar (for spraying)\n* Honey Hog Hot rub\n* **4 fat slices** of butter\n* Brown sugar\n\n#### Rub\n* **6T** brown sugar\n* **3T** black pepper\n* **2T** garlic powder\n* **2T** paprika\n* **1T** onion powder\n\n### Instructions\n1. **Prep:** Score the fat side of the pork butt and sprinkle it with salt. Mix your rub ingredients and apply generously to all sides.\n2. **Cook:** Place on the smoker at 225-250°F, fat side up (or down, depending on preference).\n3. Once the bark sets, spray the meat only with apple cider vinegar.\n4. When it reaches wrapping temperature (around 170°F and the fat is starting to render), pull it from the smoker. Sprinkle Honey Hog Hot rub on top, then layer on 4 fat slices of butter and a handful of brown sugar.\n5. Place the pork butt into an aluminum pan, foil tightly over the top, and return to the smoker.\n6. Pull from the smoker when it is probe tender (around 202°F) and let it rest."}, {"uuid": "uj5qxhctuesjzofrw3kvxqtace", "title": "Smoked Roaster Chicken", "ainfo": "Smoked Roaster Chicken", "category": "smoked", "tags": [], "cookbook": false, "attribution": "", "preview": "5 lb roaster chicken, giblets removed", "notes": "# Smoked Roaster Chicken\n\n### Ingredients\n* **5 lb** roaster chicken, giblets removed\n\n#### Seasoning Rub\n* **1 tbsp** brown sugar\n* **1 tbsp** black pepper\n* **1 tbsp** garlic powder\n* **1 tbsp** paprika\n* **1 tbsp** onion powder\n* **2 tsp** sea salt\n* **½ tsp** cayenne pepper\n\n### Instructions\n1. Pre-heat smoker to 225°F.\n2. Remove giblets from inside of roaster chicken and rinse bird with fresh water.\n3. With breast side down, cut on each side of backbone with poultry shears to remove the backbone.\n4. Turn chicken over, breast side up, and push down on the breasts with the palm of your hand firmly to break the breast bone, allowing chicken to lay flat. Using your fingers, loosen the skin from the breast meat.\n5. Dry chicken with paper towels and coat with olive oil. Make sure to get both sides of the bird and underneath the loosened skin.\n\n*Note: Instructions appear to be cut off after step 5.*"}, {"uuid": "kq5llmh5uu2vkcvpub6j77nqdi", "title": "Smoked Salmon", "ainfo": "Smoked Salmon", "category": "smoked", "tags": ["David Recipes"], "cookbook": false, "attribution": "", "preview": "Salt (for dry brine)", "notes": "# Smoked Salmon\n\n### Ingredients\n* Salmon\n* Salt (for dry brine)\n* Pepper\n* Irish butter (1-2T)\n\n### Instructions\n1. Dry brine the salmon with salt.\n2. Preheat the smoker to 200°F.\n3. Dust the salmon with pepper, applying it to the top last.\n4. Cook for 1 to 1.5 hours until nicely browned.\n5. Increase the smoker temperature to 275°F.\n6. Wrap each piece of salmon in aluminum foil and place 1-2T of Irish butter on top.\n7. Cook until the internal temperature reaches 155°F.\n8. Once the temperature is reached, leave it in the smoker for 1 minute.\n9. Pull and serve."}, {"uuid": "qgmvio4m5hcloyejkudjx3lnmu", "title": "Smoked Salsa", "ainfo": "Smoked Salsa", "category": "smoked", "tags": ["David Recipes"], "cookbook": false, "attribution": "", "preview": "1 pound steak tomatoes, cut into wedges with the middle stem removed", "notes": "# Smoked Salsa\n\n### Ingredients\n* **1 pound** steak tomatoes, cut into wedges with the middle stem removed\n* **¼ cup** red onion, cut into a wedge\n* **1** jalapeño, cut in half\n* **4 cloves** garlic\n* **1 cup** fresh cilantro leaves\n* Juice of **1** lime\n* Salt to taste\n\n### Instructions\n1. Smoke the garlic, tomatoes, onion, and jalapeños for 90 minutes at 225°F.\n2. Add the smoked ingredients to a blender.\n3. Add the cilantro, lime juice, and 1t of salt.\n4. Blend until desired consistency is reached, then serve."}, {"uuid": "cggpjyzc5hlsphnypuh3twcfei", "title": "Smoked Santa Maria Tri-tip or Ribeyes", "ainfo": "Smoked Santa Maria Tri-tip or Ribeyes", "category": "smoked", "tags": ["David Recipes"], "cookbook": false, "attribution": "", "preview": "1T sea salt (apply to meat separately and rest in fridge for 30 minutes)", "notes": "# Smoked Santa Maria Tri-tip or Ribeyes\n\n### Ingredients\n\n#### Rub\n* **1T** sea salt (apply to meat separately and rest in fridge for 30 minutes)\n* **1T** black pepper\n* **1T** paprika\n* **1T** fresh rosemary (minced)\n* **1t** garlic powder\n* **1-2 cloves** minced garlic\n* **2t** onion powder\n* **1t** cayenne pepper\n* **1t** chipotle chili pepper\n\n### Instructions\n1. Set smoker to 225°F, pull at 115-120°F IT (~1.5 hours).\n2. Reverse sear with butter and rosemary.\n3. Rest for 15 minutes."}, {"uuid": "fsef5hlgtd63vxgxw4exjegmaq", "title": "Smoked Spatchcock Chicken", "ainfo": "Smoked Spatchcock Chicken", "category": "smoked", "tags": ["David Recipes"], "cookbook": false, "attribution": "", "preview": "1 tablespoon brown sugar", "notes": "# Smoked Spatchcock Chicken\n\n### Ingredients\n\n#### Seasoning Rub\n* 1 tablespoon brown sugar\n* 1 tbsp black pepper\n* 1 tablespoon garlic powder\n* 1 tablespoon paprika\n* 1 tablespoon onion powder\n* 2 teaspoon sea salt\n* ½ teaspoon cayenne pepper\n\n#### Dry Rub\n* ⅓ cup brown sugar\n* 1 teaspoon kosher salt\n* 1 teaspoon onion powder\n* 1 teaspoon paprika\n* 1 teaspoon onion salt\n* ½ teaspoon garlic powder\n* ¼ teaspoon freshly ground black pepper\n* ¼ teaspoon cumin\n* ¼ teaspoon cinnamon\n* ¼ teaspoon cayenne\n\n### Instructions\n1. Preheat to 225°F.\n2. Cook for 45 minutes then increase to 400-425°F.\n3. Pull at 160°F IT and rest for 15 minutes with a loose foil tent."}, {"uuid": "zoj5m3ybq5ho7tw5ynrqhiuphu", "title": "Smoked St Louis Ribs", "ainfo": "Smoked St Louis Ribs", "category": "smoked", "tags": ["David Recipes"], "cookbook": false, "attribution": "", "preview": "Rib racks", "notes": "# Smoked St Louis Ribs\n\n### Ingredients\n* Rib racks\n* Salt and pepper seasoning\n* Lard (3 heaps total / 1.5 per rack)\n* 50/50 apple cider vinegar and water solution (for spritzing)\n\n### Instructions\n1. Season the ribs with salt and pepper, score the membrane on the back, and trim any flyaways or loose pieces of meat.\n2. Place 3 heaps of lard (1.5 per rib rack) into an aluminum pan to melt and smoke.\n3. Preheat the smoker to 225°F. Place the lard pan and the ribs (meat side up) in the smoker for 3 hours.\n4. After 2 hours (or when the meat turns a deep red color and starts to dry out), begin spritzing with the 50/50 apple cider vinegar and water solution every 15-20 minutes.\n5. Increase the smoker temperature to 275°F for 1 hour to achieve pullback, continuing to spritz every 15-20 minutes.\n6. Wrap the ribs in butcher paper, pouring the smoked liquid lard over them. Lay them meat side down for 30 minutes.\n7. Pull the ribs when they hit 207°F internal temperature, feel probe tender, or pass the bend test."}, {"uuid": "77e3xmfnsquioy72tmf4alxmj4", "title": "Smoked Wings", "ainfo": "Smoked Wings", "category": "smoked", "tags": ["David Recipes"], "cookbook": false, "attribution": "", "preview": "Chicken wings", "notes": "# Smoked Wings\n\n### Ingredients\n* Chicken wings\n* Cooking spray or oil binder\n\n#### Wing Rub\n* **2 Tablespoons** brown sugar\n* **1 Tablespoon** baking powder\n* **1 Tablespoon** smoked paprika\n* **1 teaspoon** chili powder\n* **1 teaspoon** chipotle chili powder\n* **1 teaspoon** garlic powder\n* **1 teaspoon** onion powder\n* **1 teaspoon** kosher salt\n* **1 teaspoon** black pepper\n\n#### Buffalo Sauce\n* **8T (1 stick)** of butter\n* **6T** Frank's RedHot\n* **½t** Worcestershire sauce\n* **½t** cayenne pepper\n\n#### Valentina's Honey Hot Sauce\n* **8T (1 stick)** of butter\n* **6T** Valentina's Very Hot sauce\n* **2T** honey\n\n### Instructions\n1. Pat the chicken wings completely dry with paper towels.\n2. Dust the wings evenly with the dry wing rub.\n3. Heat your smoker to 325°F.\n4. Place the wings skin side down and cook for 15 minutes.\n5. Flip the wings and cook for another 15 minutes.\n6. Flip one more time and cook for another 15 minutes.\n7. Pull the wings from the smoker and toss them thoroughly in either the Buffalo or Valentina's Honey Hot sauce.\n8. Place the sauced wings back into the smoker for 5 final minutes to lock in the sauce."}, {"uuid": "6ea3bbv7vt2r6n4n5lv7blyctm", "title": "Sourdough Proofing Times based on Temp", "ainfo": "Sourdough Bulk Fermentation Guide", "category": "reference", "tags": ["reference"], "cookbook": false, "attribution": "", "preview": "Source: The Sourdough Journey (thesourdoughjourney.com)", "notes": "# Sourdough Bulk Fermentation Guide\n*Source: The Sourdough Journey (thesourdoughjourney.com)*\n\n## Dough Temping Guide\n\n### Recipe Assumptions\n* 90% bread flour, 10% whole-wheat flour\n* 75% hydration, 2% salt, 20% starter\n* Final proof / cold retard at 39°F/4°C for 12–16 hours\n* Bulk fermentation timing begins when you add the starter\n* \"Strong\" starters may ferment faster\n\n### Bulk Fermentation Time & Rise by Dough Temperature\n\n| Dough Temp | Approx. Timing | Target % Rise |\n|---|---|---|\n| 80°F / 27°C | 5.5 hrs | 30% |\n| 79°F / 26°C | 5.5 hrs | 30% |\n| 78°F / 25.5°C | 6 hrs | 40% |\n| 77°F / 25°C | 6 hrs | 40% |\n| 76°F / 24.5°C | 7 hrs | 50% |\n| 75°F / 24°C | 7 hrs | 50% |\n| 74°F / 23°C | 8 hrs | 55% |\n| 73°F / 22.5°C | 9 hrs | 60% |\n| 72°F / 22°C | 10 hrs | 65% |\n| 71°F / 21.5°C | 11 hrs | 70% |\n| 70°F / 21°C | 12 hrs | 75% |\n| 69°F / 20.5°C | 13 hrs | 80% |\n| 68°F / 20°C | 14 hrs | 85% |\n| 67°F / 19.5°C | 15 hrs | 90% |\n| 66°F / 19°C | 16 hrs | 95% |\n| 65°F / 18°C | 16+ hrs | 100%+ |\n\n## Skill Levels\n\n### 1. Beginner: Dough Temperature and Time\nWarm dough ferments faster than cool dough. If you know your dough temperature, use the table above to estimate your approximate bulk fermentation timing. Estimated times are the **least accurate** method for determining the end of bulk fermentation. Experienced bakers learn to watch the dough and **ignore the clock!**\n\n### 2. Beginner: Read the Crumb\nEach time you bake a loaf, assess the crumb for signs of underproofing or overproofing. Underproofed dough needs more bulk fermentation — overproofed dough needs less. Make small adjustments each time you bake until you find your fermentation sweet spot.\n\n### 3. Intermediate: Dough Temperature and % Rise\nThe two-factor method measures both dough temperature and percentage rise in the dough — the simplest and most reliable bulk fermentation method. The percentage rise method is the most popular method for home bakers.\n\n### 4. Advanced: Read the Dough\nExperienced bakers use additional cues to \"read the dough\" for perfect bulk fermentation every time — assessing the look, feel, and smell of the dough. The Bulk-o-Matic system uses nine criteria for perfect fermentation.", "image": "fermentation-guide.png"}, {"uuid": "btmtaeqkpkunqepu3qqv3q2woi", "title": "Sourdough Baguettes", "ainfo": "Sourdough Baguettes", "category": "sourdough", "tags": [], "cookbook": false, "attribution": "", "preview": "1.8oz (50g) mature sourdough starter", "notes": "# Sourdough Baguettes\n\n### Ingredients\n\n#### For Levain Build:\n* **1.8oz (50g)** mature sourdough starter\n* **1 tbsp (25g)** organic whole wheat flour\n* **2.6oz (75g)** organic bread flour\n* **2.5oz (70g)** warm water\n\n#### For the Final Mix:\n* **17.6oz (500g)** all purpose flour\n* **2tsp (10g)** kosher salt\n* **3.5oz (100g)** levain (from build above)\n* **Up to 13.2oz (375g)** warm water\n\n### Instructions\n1. Build your levain by mixing all the levain ingredients together in a large bowl. Let it rest at an ambient temperature of 72–75°F (22–23°C) for 3–4 hours. It is ready when you pull it and see a web-like structure.\n2. Add 10.5oz (300g) of your warm water to your developed levain and mix to dissolve.\n3. Add 17.6oz (500g) of your all-purpose flour to the liquid and mix until no dry flour is left. Let the dough rest for 30 minutes."}, {"uuid": "vlb2hxohmtsip632monnwtyfte", "title": "Sourdough Bread", "ainfo": "Sourdough Bread", "category": "sourdough", "tags": ["reference"], "cookbook": false, "attribution": "", "preview": "Total Dough Weight: 800 g", "notes": "# Sourdough Bread\n\n### Parameters\n* **Total Dough Weight:** 800 g\n\n### Ingredients\n* **Bread Flour (55%):** 217.8 g\n* **Whole Wheat Flour (45%):** 178.2 g\n* **Water (80%):** 316.8 g\n* **Sourdough Starter (20%):** 79.2 g\n* **Salt (2%):** 7.9 g"}, {"uuid": "jr4qt275vcxok5dgnybmhaqtei", "title": "Sourdough Chocolate Chip Cookies", "ainfo": "Sourdough Chocolate Chip Cookies", "category": "sourdough", "tags": [], "cookbook": false, "attribution": "", "preview": "2 sticks butter", "notes": "# Sourdough Chocolate Chip Cookies\n\n### Ingredients\n* **2 sticks** butter\n* **½ cup** granulated sugar\n* **½ cup** brown sugar\n* **1** egg\n* **¾ cup** sourdough starter\n* **2 teaspoons** vanilla extract\n* **2 cups** all-purpose flour\n* **1 teaspoon** salt\n* **½ teaspoon** baking soda\n* **¼ teaspoon** baking powder\n* **2 cups** chocolate chunks\n\n### Instructions\n\n#### For Quick Version:\n1. Preheat oven to 350 degrees.\n2. In a stand mixer with paddle attachment, cream butter and sugar together for a few minutes until light and fluffy.\n3. Add egg and mix until well incorporated.\n4. Add vanilla and sourdough starter and mix until just combined.\n5. In a separate bowl, mix dry ingredients together.\n6. Add the dry ingredients to the wet ingredients about ⅓ at a time, and mix until just incorporated.\n7. Add chocolate and gently combine.\n8. Place on a parchment lined baking sheet and bake for 10 minutes or until the edges begin to turn golden.\n\n#### Long Fermented Version:\n1. The night before, mix together melted butter, sourdough starter and flour in a stand mixer bowl and cover. Allow the grains to ferment for 8–24 hours.\n2. The next day, preheat oven to 350.\n3. Add egg and vanilla to the sourdough starter mixture, and mix together well.\n4. Sprinkle the remaining dry ingredients into the bowl and stir.\n5. Fold in chocolate chunks.\n6. For best results, refrigerate dough for at least one hour prior to baking.\n7. Bake for 10 minutes or until the edges start to turn golden brown."}, {"uuid": "s5fkaphbyvngdqspvqxc72f3ou", "title": "Sourdough Discard", "ainfo": "How to Add Sourdough Discard to Any Recipe", "category": "sourdough", "tags": ["reference"], "cookbook": false, "attribution": "", "preview": "7 grams of commercial yeast (one packet) is roughly equivalent to 100 grams (about 1/2 cup) of sourdough starter.", "notes": "# How to Add Sourdough Discard to Any Recipe\n\n### Substitution Ratio\n* 7 grams of commercial yeast (one packet) is roughly equivalent to 100 grams (about 1/2 cup) of sourdough starter.\n\n### Adjusting Yeast-Based Recipes\nTo substitute discard or active starter in recipes calling for commercial yeast:\n* Omit the yeast.\n* Subtract 50 grams of flour (a scant 1/2 cup) and 50 grams of liquid (about 3 tablespoons) from the recipe.\n* Add 100 grams (about 1/2 cup) of sourdough starter.\n\n### Adjusting Non-Yeasted Recipes\nIn recipes that don't call for yeast, like banana bread or pancakes:\n* Subtract 50 grams of flour (a scant 1/2 cup) and 50 grams of liquid (about 3 tablespoons).\n* Add 100 grams of starter or discard (about 1/2 cup).\n\n### Adjusting Low or No Liquid Recipes\nFor recipes like chocolate chip cookies that don't contain a lot of liquid:\n* Get creative by eliminating water by browning the butter.\n* Alternatively, consider using only egg yolks instead of egg whites to reduce the water even further."}, {"uuid": "ecb2d7brxoasvzylfknjuyvkbe", "title": "Sourdough Discard Boule / Dough", "ainfo": "Sourdough Discard Boule / Dough", "category": "sourdough", "tags": [], "cookbook": false, "attribution": "", "preview": "100g Cold, refrigerated discard", "notes": "# Sourdough Discard Boule / Dough\n\n### Ingredients\n* **100g** Cold, refrigerated discard\n* **330g** Filtered room temp water\n* **500g** AP flour (unbleached, preferably Costco green/white bag)\n* **10g** Salt\n* **30g** Filtered room temp water (for mixing/fraisage)"}, {"uuid": "kf3o6wwnr32bjzooyaj65nevoe", "title": "Sourdough Discard Cinnamon Rolls", "ainfo": "Sourdough Discard Cinnamon Rolls", "category": "sourdough", "tags": [], "cookbook": false, "attribution": "", "preview": "4 tbsp butter, softened", "notes": "# Sourdough Discard Cinnamon Rolls\n\n### Ingredients\n\n#### For the Dough:\n* **4 tbsp** butter, softened\n* **¾ cup** sourdough starter discard\n* **2 tbsp** honey\n* **3 cups** flour (all purpose or whole wheat pastry flour)\n* **1 tsp** fine sea salt\n* **1 large** egg\n* **1 tsp** yeast\n* **⅔ cup** milk, warmed (but not hot)\n\n#### For the Filling:\n* **½ cup** brown sugar\n* **2 tbsp** honey\n* **2 tbsp** butter, melted\n* **½ tsp** vanilla extract\n* **1 tsp** cinnamon\n\n#### For the Frosting:\n* **4 oz** cream cheese, softened\n* **1 tbsp** butter, softened\n* **3 tbsp** powdered sugar\n* **½ tsp** vanilla extract\n* **1 tbsp** milk\n\n### Instructions\n1. In the bowl of a stand mixer, or in a large bowl, mix all of the dough ingredients until a dough starts to form. Use the dough hook (or your hands) to knead the dough until you have a smooth dough, about 2–3 minutes.\n2. Cover the bowl and let the dough rise at room temperature for 2–3 hours, or until puffy and doubled in size.\n3. Gently turn the dough out onto a lightly floured surface and roll into a ¼\" thick rectangle. I like to roll it on a piece of parchment or silicone baking mat to make it easier to roll up later.\n4. Mix the brown sugar, honey, butter, vanilla, and cinnamon for the filling in a small bowl. Spread the filling mixture evenly over the dough, leaving about an inch bare on one of the long edges.\n5. Roll the dough up starting on the long edge that has filling all the way to the edge. Use a bench scraper to help if the dough is sticking a little bit.\n6. Cut the dough into 12 even rolls. Place them in a baking dish that has been greased or lined with parchment paper.\n7. Cover the dish and let the rolls rise for 1.5 to 2 hours at room temperature, or place them in the refrigerator for an extended rise time overnight. At the end of the rise, rolls should look puffy but may not have doubled in size.\n8. If your rolls are room temperature, heat the oven to 400°F. Uncover and bake 16–20 minutes. If they are coming from the refrigerator, heat the oven to 375°F. Uncover the rolls and bake 20–25 minutes.\n9. While rolls are baking, make the icing. Whisk softened cream cheese, butter and powdered sugar until no lumps remain. Add vanilla and milk and whisk until smooth.\n10. Remove rolls from the oven and frost while warm, or frost individually as you eat them if you plan to save some for later."}, {"uuid": "2ur6cdchobx6mrp555e42v6idm", "title": "Sourdough Discard Lemon Shortbread Cookies", "ainfo": "Sourdough Discard Lemon Shortbread Cookies", "category": "sourdough", "tags": [], "cookbook": false, "attribution": "", "preview": "½ cup sourdough discard", "notes": "# Sourdough Discard Lemon Shortbread Cookies\n\n### Ingredients\n* **½ cup** sourdough discard\n* **1 cup** unsalted butter, softened\n* **½ cup** powdered sugar\n* **1 tbsp** lemon zest\n* **2 tbsp** fresh lemon juice\n* **2 cups** all-purpose flour\n* **¼ tsp** salt\n* **¼ cup** granulated sugar (for rolling)\n\n#### For the Glaze:\n* **1 cup** powdered sugar\n* **2 tbsp** fresh lemon juice\n* **½ tsp** vanilla extract\n\n### Instructions\n1. **Cream Butter and Sugar:** In a mixing bowl, beat butter and powdered sugar until light and fluffy.\n2. **Add Lemon & Sourdough:** Mix in sourdough discard, lemon zest, and lemon juice until fully combined.\n3. **Incorporate Dry Ingredients:** Stir in flour and salt until a dough forms.\n4. **Shape and Chill:** Roll the dough into a log, wrap in plastic wrap, and chill for at least 2 hours.\n5. **Slice and Bake:** Preheat oven to 350°F (175°C). Slice dough into ¼-inch rounds, roll edges in granulated sugar, and place on a lined baking sheet. Bake for 12–15 minutes until edges are lightly golden. Cool completely.\n6. **Prepare the Glaze:** Whisk powdered sugar, lemon juice, and vanilla extract until smooth.\n7. **Glaze:** Dip or drizzle cookies with glaze, then let set before serving."}, {"uuid": "vd24j55frqmwmpgdgzkjcmruqi", "title": "Sourdough Discard Pretzel Bites", "ainfo": "Sourdough Discard Pretzel Bites", "category": "sourdough", "tags": [], "cookbook": false, "attribution": "", "preview": "1 cup + 2 Tablespoons warm water", "notes": "# Sourdough Discard Pretzel Bites\n\n### Ingredients\n\n#### For the Dough\n* **1 cup + 2 Tablespoons** warm water\n* **1 Tablespoon** dark brown sugar\n* **2 teaspoons** kosher salt\n* **1 ¼ teaspoons** active dry yeast\n* **200 grams (about ¾ cup)** sourdough discard unfed, at room temperature\n* **567 grams (about 4 cups)** all-purpose flour\n* **4 Tablespoons** unsalted butter, melted\n\n#### For Boiling\n* **10 cups** water\n* **⅔ cup** baking soda\n\n#### For Topping\n* **1 egg yolk** beaten with 1 Tablespoon water (to make an egg wash)\n* flaky sea salt\n* everything bagel seasoning\n\n### Instructions\n1. Combine the warm water, dark brown sugar, and kosher salt in the bowl of a stand mixer. Sprinkle the yeast on top and let sit for 5 minutes or until the yeast begins to foam. If the yeast does not foam, your yeast is dead and you'll need to start again with fresh yeast.\n2. Add the sourdough discard, flour, and melted butter and mix using the dough hook attachment until well-combined. If needed, add more flour or water (1 Tablespoon at a time) to reach your desired dough consistency. Change to medium speed or knead by hand for 4-5 minutes until a smooth dough forms. The dough should not be sticky.\n3. Shape the dough into a ball and transfer to a large, oiled bowl. Cover with plastic wrap and let rise for about 1 hour, or until doubled in size.\n4. Preheat the oven to 450°F. Line 2 half-sheet baking trays with parchment paper and set aside. Bring 10 cups of water and ⅔ cup baking soda to a boil in a large pot.\n5. In the meantime, turn the dough out onto a smooth, dry work surface (no need to flour or oil). Divide into 8 equal-sized pieces. Roll each piece into a 12-14 inch rope. Cut the rope into bite-size pieces about 1 ½-inches long. Roll each piece of dough into a ball (roughly the size of a quarter) and place on the prepared baking pan.\n6. Place the pretzel bites in the boiling water mixture for about 30 seconds. Remove using a slotted spatula or spoon and spread on the baking sheet so they're not touching and have room to expand. The bites will be easier to spread while they're still wet; they'll become stickier as they dry.\n7. Lightly brush each pretzel bite with egg wash and sprinkle with your chosen toppings (flaky sea salt, everything bagel seasoning, etc.)\n8. Bake until golden brown, approximately 13-15 minutes. Transfer to a cooling rack to cool fully. Serve with a mustard or your favorite dipping sauce."}, {"uuid": "lok4uifevjqhg2uf5inlzu5dmi", "title": "Sourdough English Muffins (Overnight)", "ainfo": "Sourdough English Muffins (Overnight)", "category": "sourdough", "tags": [], "cookbook": false, "attribution": "", "preview": "245g (1 cup plus 1 tsp) milk, whole or 2%", "notes": "# Sourdough English Muffins (Overnight)\n\n### Ingredients\n* **245g** (1 cup plus 1 tsp) milk, whole or 2%\n* **120g** (½ cup) water\n* **56g** (4 tbsp) unsalted butter, cubed\n* **75g** (heaped ⅓ cup) active sourdough starter\n* **24g** (2 tbsp) sugar\n* **500g** (4 cups plus 2 tbsp) all-purpose flour\n* **9g** (1 ½ tsp) fine sea salt\n* **Cornmeal or semolina flour**, for dusting\n\n### Instructions\n1. **Make the Dough:** In a small saucepan, warm the milk, water, and butter together. Cool slightly before adding to the dough. In a large bowl, add the sourdough starter and sugar. Pour in the warm milk mixture while whisking to combine. Add the flour and salt. Mix with a fork to form a rough dough, and then finish by hand to fully incorporate the flour. Cover with a damp towel and let rest at room temperature for 30 minutes.\n2. **Smooth the Dough:** After the dough has rested, return to the bowl and work the dough into a semi-smooth ball.\n3. **Bulk Rise:** Cover the bowl with lightly oiled plastic wrap. Let rise at room temperature defined as 70°F (21°C) until double in size, about 8–10+ hours. Once risen, chill overnight in the fridge.\n4. **Shape:** In the morning, remove the cold dough onto a floured work surface. Rest for 10 minutes. Line a sheet pan with parchment paper; sprinkle generously with cornmeal to prevent sticking. With floured hands, pat the dough into a rectangular shape, about ½-inch (1.25 cm) thick. Cut into 10–12 rounds using the rim of a 3 or 5 inch drinking glass, large jar, or biscuit cutter. Place the rounds onto your sheet pan and dust the tops with cornmeal.\n5. **Second Rise:** Cover the dough with a damp towel or inverted rimmed sheet pan. Let rest at room temperature until noticeably puffy, about 1 hour or more depending on temperature.\n6. **Cook:** Warm a large, non-stick skillet over low heat. Do a test batch: place one round of dough into the pan. Cover with a lid. Cook on one side for 8–10 minutes, checking at the halfway mark for even browning. Lower the heat if necessary. Flip the dough over, cover, and cook the other side for 8–10 minutes. Repeat to cook the rest of the dough. When the English muffins are ready, they should feel lightweight and the sides should spring back when pressed gently.\n\n*Note: If the flame is too high, the muffins will brown too quickly on the outside leaving the center undercooked. If this happens, finish baking the muffins in a low-heat oven about 250°F (130°C) until cooked through.*"}, {"uuid": "a46x5xhwl3hchjidmq3w6gm5yy", "title": "Sourdough Oatmeal Cookies", "ainfo": "Sourdough Oatmeal Cookies", "category": "sourdough", "tags": [], "cookbook": false, "attribution": "", "preview": "1 cup unsalted butter, softened", "notes": "# Sourdough Oatmeal Cookies\n\n### Ingredients\n* **1 cup** unsalted butter, softened\n* **¾ cup** brown sugar\n* **½ cup** granulated sugar\n* **2** eggs\n* **2 teaspoons** vanilla\n* **½ cup** sourdough discard\n* **3 cups** oats\n* **2 cups** all purpose flour\n* **1 teaspoon** baking soda\n* **½ teaspoon** baking powder\n* **2 teaspoons** cinnamon\n* **1 teaspoon** salt\n* **1 cup** raisins (can also sub chocolate chips)\n* **Optional:** ½ cup walnuts\n\n### Instructions\n1. Preheat to 350 degrees.\n2. In a stand mixer with paddle attachment, cream butter, brown sugar and granulated sugar together for a few minutes until light and fluffy. Scrape down the sides on occasion to fully incorporate all ingredients.\n3. Add the eggs in one at a time and mix until well incorporated.\n4. Add vanilla and sourdough discard and mix until just combined.\n5. In a separate bowl, combine the oats, flour, baking soda, baking powder, cinnamon and salt.\n6. Add the dry ingredients to the wet ingredients about ⅓ at a time, then mix until just incorporated.\n7. Fold in raisins and gently combine them into the dough.\n8. Spoon onto a parchment lined baking sheet and bake for 10 minutes or until the edges begin to turn golden."}, {"uuid": "kskc5acsbizilmov2vnw7b5t3m", "title": "Sourdough Zucchini Bread", "ainfo": "Sourdough Zucchini Bread", "category": "sourdough", "tags": [], "cookbook": false, "attribution": "", "preview": "Yield: one 9\" x 5\" loaf or 12\" tea loaf", "notes": "# Sourdough Zucchini Bread\n\n**Yield:** one 9\" x 5\" loaf or 12\" tea loaf\n\n### Ingredients\n* 3/4 cup (170g) sourdough starter, fed (ripe) or unfed (discard)\n* 1/2 cup (99g) granulated sugar\n* 1/4 cup (85g) honey\n* 6 tablespoons (75g) vegetable oil\n* 2 large eggs\n* 1/4 teaspoon nutmeg\n* 1 1/2 teaspoons lemon zest (grated rind)\n* 1 1/2 teaspoons vanilla extract\n* 1 cup (113g) King Arthur White Whole Wheat Flour\n* 3/4 cup (90g) King Arthur Unbleached All-Purpose Flour\n* 1/2 teaspoon baking soda\n* 1 teaspoon baking powder\n* 1 teaspoon salt\n* 2 cups (242g to 300g) grated zucchini, somewhere between firmly and lightly packed\n* 3/4 cup (85g) chopped walnuts, lightly toasted\n* 3/4 cup (128g) raisins, currants, or dried cranberries\n\n### Instructions\n1. Preheat the oven to 350°F. Lightly grease a 9\" x 5\" quick bread pan or 12\" x 4\" tea loaf pan.\n2. In a large bowl, stir together the starter, sugar, honey, oil, eggs, nutmeg, lemon zest, and vanilla until thoroughly combined.\n3. In a separate medium bowl, whisk together the flours, baking soda, baking powder, and salt; stir into the wet ingredients.\n4. Stir in the grated zucchini, then the nuts and fruit. Transfer the batter to the prepared pan, smoothing the top.\n5. Bake the bread in the 9\" x 5\" pan for 45 minutes. Tent with foil and bake for an additional 20 minutes, until a thin paring knife inserted in the center comes out clean. For bread in a tea loaf pan, bake for 40 minutes before tenting, then bake for another 20 minutes, or until the loaf tests done.\n6. Remove the bread from the oven and cool in the pan on a rack.\n7. Store bread, well wrapped, at room temperature for up to three days; freeze for longer storage."}, {"uuid": "xoerps6wgrszoo7gsxf4uy7prq", "title": "Spanish Rice (Marina Version)", "ainfo": "Spanish Rice (Marina Version)", "category": "sides", "tags": [], "cookbook": false, "attribution": "", "preview": "1 ½ cups of rice", "notes": "# Spanish Rice (Marina Version)\n\n### Ingredients\n* **1 ½ cups** of rice\n* **3 cups** water\n* **½ can** tomato sauce\n* Onion\n* Garlic powder\n* Salt\n\n### Instructions\n1. Brown rice in oil and add onion.\n2. After rice is a little brown, add tomato sauce & water.\n3. Add garlic powder & salt.\n4. Let boil for a minute.\n5. Then put lid on top.\n6. Turn down to lowest setting; should be done in 20 minutes."}, {"uuid": "nf5kwevd6q5amkf2qx3w7ffnra", "title": "Sugar Cookies", "ainfo": "Sugar Cookies", "category": "desserts", "tags": [], "cookbook": true, "attribution": "Miranda", "preview": "Miranda's Recipe", "notes": "## Sugar Cookies\n*Miranda's Recipe*\n\n### Things You Need\n\n#### Cookies\n* 1 package Betty Crocker Sugar Cookie Mix\n* 7/8 tbsp of soft/melted butter\n* 1 tbsp cream cheese\n* 1 egg\n* 1/4 tsp almond extract\n* 3 tbsp flour\n\n#### Frosting\n* 2 cups powdered sugar\n* 1/4 tsp almond extract\n* 1/2 tsp vanilla extract\n* 2 tsp meringue powder\n* 1 tbsp corn syrup\n* 1 tsp glycerin\n* 1 tbsp milk\n* 1 tbsp butter (warmed with 1/4 cup water, add to thin to desired consistency)\n\n### Directions\n1. Mix the cookie ingredients together.\n2. Roll out the dough to 3/8 inch thickness.\n3. Bake at 350°F for 6–7 minutes.\n4. Prepare frosting by mixing the ingredients and adjust consistency with the warmed butter-water mixture. Frost cookies once cooled."}, {"uuid": "4qedjlneyqvnwkxdhfukk5doca", "title": "Sweet and Spicy Suka Sawasawan", "ainfo": "Sweet and Spicy Suka Sawasawan", "category": "asian", "tags": [], "cookbook": false, "attribution": "", "preview": "2 cups cane vinegar", "notes": "# Sweet and Spicy Suka Sawasawan\n\n### Ingredients\n* **2 cups** cane vinegar\n* **1 large** red onion, chopped\n* **6 cloves** garlic, pounded\n* **1 tbsp** black pepper\n* **1 tbsp** white pepper\n* **10** Thai chilies, cut in half\n* **3 tbsp** brown sugar\n* **½ tsp** Himalayan salt\n\n### Instructions\n1. Mix all ingredients in a bowl."}, {"uuid": "bwuwelfj7fgn2sk5hbf43uln6m", "title": "Sweet Pepper Pickle/Relish Base", "ainfo": "Sweet Pepper Pickle/Relish Base", "category": "sauces", "tags": [], "cookbook": false, "attribution": "", "preview": "4 Garlic cloves", "notes": "# Sweet Pepper Pickle/Relish Base\n\n### Ingredients\n* **4** Garlic cloves\n* **2 cups** Sweet peppers\n* **2 tsp** Salt\n* **2 tbsp** Sugar\n* **¼ cup** Rice vinegar\n* **¾ cup** Water"}, {"uuid": "d5ab337agdxoywhrfagnye627m", "title": "Tamale Masa (The Spruce Eats)", "ainfo": "Tamale Masa (The Spruce Eats)", "category": "mains", "tags": [], "cookbook": false, "attribution": "", "preview": "6 cups masa harina", "notes": "# Tamale Masa (The Spruce Eats)\n\n### Ingredients\n* **6 cups** masa harina\n* **5 cups** warm water (or low-sodium chicken broth)\n* **2 cups** pork lard\n* **2 teaspoons** salt\n* **3 tablespoons** onion powder (optional)\n* **3 tablespoons** chili powder (optional)\n* **2 tablespoons** ground cumin (optional)"}, {"uuid": "tp4o5irlu6jxsl25hvle5zgjsu", "title": "Thai Curry", "ainfo": "Thai Curry", "category": "asian", "tags": [], "cookbook": true, "attribution": "Thu", "preview": "Thu's Recipe", "notes": "## Thai Curry\n*Thu's Recipe*\n\n### Things You Need\n* Chicken stock base\n* Sweet onions\n* Carrots\n* Medium golden curry\n* Boiled chicken breast\n* Potatoes\n* Green onions / cilantro\n* Jasmine rice (for serving)", "photos": ["thai-curry.jpg"], "photo": "thai-curry.jpg"}, {"uuid": "kg4klcehepu373f2pnobfltorm", "title": "Tomahawk + Compound Garlic Herb Butter", "ainfo": "Tomahawk", "category": "smoked", "tags": ["David Recipes"], "cookbook": false, "attribution": "", "preview": "Olive oil", "notes": "# Tomahawk\n\n### Ingredients\n\n#### Roasted Garlic\n* Olive oil\n\n#### Compound Garlic Herb Butter\n* 8 oz (2 sticks) unsalted butter, softened to room temperature\n* 1 whole head garlic, roasted and cloves squeezed out\n* 1 teaspoon fresh thyme, finely chopped\n* 1 teaspoon fresh rosemary, finely chopped\n* 1 teaspoon fresh parsley, finely chopped\n* 1 teaspoon red chili flakes\n* ½ teaspoon kosher salt\n* ¼ teaspoon black pepper\n\n#### Steak\n* Tomahawk steak\n* Salt, pepper, garlic and avocado oil\n* Chunks of butter\n\n### Instructions\n\n#### Roasted Garlic\n1. Preheat oven to 400°.\n2. Cut off the top ¼ and dowse in olive oil so it seeps through.\n3. Cover completely in foil.\n4. Place in oven for 40m.\n5. Let cool then squeeze out the garlic.\n\n#### Compound Garlic Herb Butter\n1. Roast the garlic then mix it all in a bowl.\n2. Wrap as a log and place in the fridge to harden.\n\n#### Tomahawk Cooking\n1. Pull from fridge.\n2. Apply salt, pepper, garlic and avocado oil.\n3. Let it sit to room temp for 45m.\n4. Target fire temp 300-350 (over coals/small flame).\n5. Pull when IT 115.\n6. Place unmelted chunks of butter and let rest for 15m."}, {"uuid": "zmyatphbq6w6xwd7enqd2cgziq", "title": "Traditional Chicken Adobo (Reddit Version 2)", "ainfo": "Traditional Chicken Adobo (Reddit Version 2)", "category": "asian", "tags": [], "cookbook": false, "attribution": "", "preview": "1 (3-pound) chicken, cut into serving pieces", "notes": "# Traditional Chicken Adobo (Reddit Version 2)\n\n### Ingredients\n* **1 (3-pound)** chicken, cut into serving pieces\n* **¾ cup** white vinegar\n* **½ cup** soy sauce\n* **1 or 2 heads** of garlic, crushed\n* **2** bay leaves\n* **½ tablespoon** peppercorns\n* **Salt** (optional)\n\n### Instructions\n1. **Simmer:** Place chicken, vinegar, soy sauce, garlic, bay leaves, and peppercorns in a pot; heat to a boil. Reduce heat; simmer 30 minutes.\n2. **Broil:** Heat broiler. Transfer chicken pieces from pot to a broiler pan; broil until browned on each side, turning once, 10 minutes. Remove to a platter.\n3. **Reduce Sauce:** Meanwhile, heat the sauce in the pot to a boil; boil until it is reduced by half, about 10 minutes. Add salt to taste if needed. Cover broiled chicken pieces with the sauce."}, {"uuid": "e2uvfptp3u3mumkqauig7ke5iu", "title": "Turkey Chili", "ainfo": "Turkey Chili", "category": "mains", "tags": [], "cookbook": true, "attribution": "Miranda", "preview": "Miranda's Recipe", "notes": "## Turkey Chili\n*Miranda's Recipe*\n\n### Details\n* **Tip:** Best prepared the night before or slow-cooked all day for depth of flavor.\n\n### Things You Need\n* Olive oil (to fry ingredients)\n* 1 lb ground turkey\n* 1 chopped sweet onion\n* 1 chopped red onion\n* 2 cups chicken stock\n* 1 (28 oz) can crushed tomatoes\n* 1 (16 oz) can dark kidney beans (partially crushed)\n* 1 tbsp minced garlic\n* 2 tbsp chili powder (adjust up or down for desired spice level)\n* 1/2 tsp paprika\n* 1/2 tsp oregano\n* 1/2 tsp cayenne pepper (adjust up or down for spice)\n* 1/2 tsp ground cumin\n* 1/2 tsp salt\n* 1/2 tsp pepper\n\n#### Add-ons (Optional Vegetables/Spices)\n* Red bell pepper\n* Celery\n* Shredded carrots\n* Jalapenos / Habanero\n* Dash of cinnamon / nutmeg\n\n#### Toppings\n* Sour cream\n* Cheese\n* Chives\n\n### Directions\n1. Heat olive oil in a pan or pot and thoroughly brown the ground turkey and chopped onions.\n2. Mix the browned meat and onions with all other primary ingredients (chicken stock, crushed tomatoes, kidney beans, garlic, and spices) inside a slow cooker or large pot.\n3. Slow cook all day for best results. Top with sour cream, cheese, and chives upon serving."}, {"uuid": "4kgrsgzlheqpxvdmwbgr2z4cyi", "title": "Various Vinaigrette Recipes", "ainfo": "3 Simple Dressings", "category": "sauces", "tags": [], "cookbook": false, "attribution": "", "preview": "Add all the ingredients to the Measure, Mix & Pour, twist on the lid, and shake until combined.", "notes": "# 3 Simple Dressings\n\n### Instructions\n1. Add all the ingredients to the Measure, Mix & Pour, twist on the lid, and shake until combined.\n\n### Vinaigrette Ingredients\n* **½ cup + 2 tbsp (155 mL)** white wine vinegar\n* **¾ cup + 2 tbsp (205 mL)** olive oil\n* **1 tbsp (15 mL)** honey\n* **1 tbsp (15 mL)** Dijon mustard\n* **½ tsp (2 mL)** salt\n* **¼ tsp (1 mL)** black pepper\n\n### Asian Vinaigrette Ingredients\n* **¼ cup + 2 tbsp (90 mL)** rice vinegar\n* **¾ cup (175 mL)** vegetable oil\n* **2 tbsp (30 mL)** sesame oil\n* **¼ cup (60 mL)** low-sodium soy sauce\n* **1 tbsp (15 mL)** honey\n* **1 tsp (5 mL)** sesame seeds\n* **½ tsp (2 mL)** ground ginger\n* **¼ tsp (1 mL)** black pepper\n* **1** garlic clove, pressed\n\n### Balsamic Vinaigrette Ingredients\n* **½ cup + 2 tbsp (155 mL)** balsamic vinegar\n* **¾ cup + 2 tbsp (205 mL)** olive oil\n* **1 tbsp (15 mL)** honey\n* **1 tbsp (15 mL)** Dijon mustard\n* **½ tsp (2 mL)** salt\n* **¼ tsp (1 mL)** black pepper\n* **1** garlic clove, pressed"}, {"uuid": "fg3avjeheuxkeaxwvjrn7nwy5m", "title": "Vietnamese Egg Rolls", "ainfo": "Vietnamese Egg Rolls", "category": "asian", "tags": [], "cookbook": false, "attribution": "", "preview": "1.7 lb ground turkey", "notes": "# Vietnamese Egg Rolls\n\n### Ingredients\n* **1.7 lb** ground turkey\n* **1** yellow onion, diced\n* **1/2** sweet onion\n* **4 cloves** of const CAT_LABELS = {
  sourdough: 'Sourdough',
  smoked:    'Smoked & BBQ',
  breads:    'Breads & Doughs',
  asian:     'Asian & Filipino',
  mains:     'Mains',
  sides:     'Sides & Salads',

  desserts:  'Desserts & Baking',
  reference: 'Reference',
};

// ── STATE
let activeFilter = 'all';
let searchQuery = '';

// ── MARKDOWN RENDERER
function renderMd(text) {
  if (!text) return '';
  const lines = text.split('\n');
  const out = [];
  let inUl = false, inOl = false;

  const flush = () => {
    if (inUl) { out.push('</ul>'); inUl = false; }
    if (inOl) { out.push('</ol>'); inOl = false; }
  };

  const inline = s => s
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+?)\*/g, '<em>$1</em>');

  // Table parsing
  let tableLines = [];
  let inTable = false;

  for (let i = 0; i < lines.length; i++) {
    const raw = lines[i];
    const line = raw.trim();

    // Detect table row
    if (line.startsWith('|') && line.endsWith('|')) {
      if (!inTable) { flush(); inTable = true; tableLines = []; }
      tableLines.push(line);
      continue;
    } else if (inTable) {
      // flush table
      out.push(buildTable(tableLines));
      tableLines = []; inTable = false;
    }

    if (!line) { flush(); out.push(''); continue; }
    if (line === '---') { flush(); out.push('<hr>'); continue; }

    const hm = line.match(/^(#{1,4})\s+(.+)/);
    if (hm) {
      flush();
      const lv = hm[1].length;
      const content = inline(hm[2]);
      out.push(`<h${lv}>${content}</h${lv}>`);
      continue;
    }

    // Note blocks (*italic text at start of line*)
    const noteM = line.match(/^\*([^*].+[^*])\*\s*$/);
    if (noteM) {
      flush();
      out.push(`<div class="note-block">${inline(noteM[1])}</div>`);
      continue;
    }

    // Unordered list
    if (/^\* /.test(line)) {
      if (inOl) { out.push('</ol>'); inOl = false; }
      if (!inUl) { out.push('<ul>'); inUl = true; }
      out.push(`<li>${inline(line.slice(2))}</li>`);
      continue;
    }

    // Ordered list
    const olm = line.match(/^(\d+)\. (.+)/);
    if (olm) {
      if (inUl) { out.push('</ul>'); inUl = false; }
      if (!inOl) { out.push('<ol>'); inOl = true; }
      out.push(`<li>${inline(olm[2])}</li>`);
      continue;
    }

    flush();
    out.push(`<p>${inline(line)}</p>`);
  }

  if (inTable) out.push(buildTable(tableLines));
  flush();
  return out.join('\n');
}

function buildTable(lines) {
  if (lines.length < 2) return lines.map(l => `<p>${l}</p>`).join('');
  const parse = l => l.split('|').slice(1, -1).map(c => c.trim());
  const headers = parse(lines[0]);
  // lines[1] is the separator row, skip
  const rows = lines.slice(2).map(parse);
  let html = '<table><thead><tr>';
  headers.forEach(h => html += `<th>${h}</th>`);
  html += '</tr></thead><tbody>';
  rows.forEach(r => {
    html += '<tr>';
    r.forEach(c => html += `<td>${c}</td>`);
    html += '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

// ── FILTER + SEARCH
function matches(r) {
  if (activeFilter === 'cookbook') {
    if (!r.cookbook) return false;
  } else if (activeFilter !== 'all') {
    if (r.category !== activeFilter) return false;
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    const haystack = (r.title + ' ' + (r.notes || '') + ' ' + r.attribution).toLowerCase();
    if (!haystack.includes(q)) return false;
  }
  return true;
}

// ── RENDER GRID
function render() {
  const grid = document.getElementById('grid');
  const meta = document.getElementById('resultsMeta');
  const visible = RECIPES.filter(matches);

  grid.innerHTML = '';
  meta.textContent = visible.length === RECIPES.length
    ? `${RECIPES.length} recipes`
    : `${visible.length} of ${RECIPES.length} recipes`;

  if (!visible.length) {
    grid.innerHTML = '<div class="no-results">No recipes found. Try a different search.</div>';
    return;
  }

  visible.forEach(r => {
    const card = document.createElement('div');
    card.className = 'card';
    if (r.photo) {
      card.classList.add('has-photo');
      card.style.backgroundImage = `url("${r.photo}")`;
    }
    card.setAttribute('tabindex', '0');
    card.setAttribute('role', 'button');
    card.setAttribute('aria-label', r.title);

    const catLabel = CAT_LABELS[r.category] || '';
    const cbBadge = r.cookbook ? '<span class="cookbook-badge">Family Cookbook</span>' : '';
    const attrHtml = r.attribution ? `<div class="card-attribution">${r.attribution}'s Recipe</div>` : '';
    const previewHtml = r.preview ? `<div class="card-preview">${escHtml(r.preview)}</div>` : '';

    card.innerHTML = `
      <div class="card-header">
        <div class="card-title">${escHtml(r.title)}</div>
        ${cbBadge}
      </div>
      <div class="card-cat">${escHtml(catLabel)}</div>
      ${attrHtml}
      ${previewHtml}
    `;

    card.addEventListener('click', () => openModal(r));
    card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openModal(r); });
    grid.appendChild(card);
  });
}

// ── COUNTS
function updateCounts() {
  const saved = { filter: activeFilter, query: searchQuery };
  const allCats = ['sourdough','smoked','breads','asian','mains','sides','sauces','desserts','reference'];

  // All
  activeFilter = 'all'; searchQuery = '';
  document.getElementById('count-all').textContent = RECIPES.filter(matches).length;

  allCats.forEach(cat => {
    activeFilter = cat; searchQuery = '';
    document.getElementById(`count-${cat}`).textContent = RECIPES.filter(matches).length;
  });

  // Cookbook
  activeFilter = 'cookbook'; searchQuery = '';
  document.getElementById('count-cookbook').textContent = RECIPES.filter(matches).length;

  activeFilter = saved.filter; searchQuery = saved.query;
}

// ── MODAL
function openModal(r) {
  document.getElementById('modalTitle').textContent = r.title;

  const badges = document.getElementById('modalBadges');
  badges.innerHTML = '';
  const catSpan = document.createElement('span');
  catSpan.className = 'modal-cat';
  catSpan.textContent = CAT_LABELS[r.category] || '';
  badges.appendChild(catSpan);

  if (r.attribution) {
    const attrSpan = document.createElement('span');
    attrSpan.className = 'modal-attr';
    attrSpan.textContent = r.attribution + "'s Recipe";
    badges.appendChild(attrSpan);
  }
  if (r.cookbook) {
    const srcSpan = document.createElement('span');
    srcSpan.className = 'modal-source';
    srcSpan.textContent = '📖 Family Cookbook';
    badges.appendChild(srcSpan);
  }

  document.getElementById('modalContent').innerHTML = renderMd(r.notes);
  setupScaleBar();

  const carousel = document.getElementById('modalCarousel');
  const track = document.getElementById('carouselTrack');
  const dotsEl = document.getElementById('carouselDots');
  const prevBtn = document.getElementById('carouselPrev');
  const nextBtn = document.getElementById('carouselNext');
  const photoList = (r.photos && r.photos.length) ? r.photos : (r.image ? [r.image] : []);

  if (photoList.length) {
    carousel.style.display = 'block';
    const multi = photoList.length > 1;
    track.innerHTML = photoList.map(src =>
      `<div class="carousel-slide"><img src="${src}" alt="${escHtml(r.title)} photo"></div>`
    ).join('');
    dotsEl.innerHTML = multi
      ? photoList.map((_, i) => `<button class="carousel-dot" data-i="${i}" aria-label="Photo ${i + 1} of ${photoList.length}"></button>`).join('')
      : '';
    prevBtn.style.display = multi ? 'flex' : 'none';
    nextBtn.style.display = multi ? 'flex' : 'none';

    let idx = 0;
    const showSlide = i => {
      idx = (i + photoList.length) % photoList.length;
      track.style.transform = `translateX(-${idx * 100}%)`;
      dotsEl.querySelectorAll('.carousel-dot').forEach((dot, di) => dot.classList.toggle('active', di === idx));
    };
    prevBtn.onclick = () => showSlide(idx - 1);
    nextBtn.onclick = () => showSlide(idx + 1);
    dotsEl.querySelectorAll('.carousel-dot').forEach(dot => {
      dot.onclick = () => showSlide(parseInt(dot.dataset.i, 10));
    });
    showSlide(0);
  } else {
    carousel.style.display = 'none';
    track.innerHTML = '';
    dotsEl.innerHTML = '';
  }

  const overlay = document.getElementById('modalOverlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  // Scroll modal to top
  document.getElementById('modal').scrollTop = 0;

  // Track current recipe for sharing & update URL hash
  currentRecipeUuid = r.uuid;
  history.replaceState(null, '', location.pathname + '#recipe-' + r.uuid);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  currentRecipeUuid = null;
  history.replaceState(null, '', location.pathname);
}

// ── EVENT LISTENERS
document.getElementById('closeBtn').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = chip.dataset.cat;
    render();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  render();
});

// ── DARK MODE
(function() {
  const saved = localStorage.getItem('theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const isDark = saved === 'dark' || (!saved && prefersDark);
  if (isDark) document.documentElement.classList.add('dark');
  const label = isDark ? 'Dark Mode On' : 'Dark Mode Off';
  document.getElementById('darkToggle').setAttribute('aria-label', label);
  document.getElementById('darkToggle').setAttribute('title', label);
})();

document.getElementById('darkToggle').addEventListener('click', () => {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  const label = isDark ? 'Dark Mode On' : 'Dark Mode Off';
  document.getElementById('darkToggle').setAttribute('aria-label', label);
  document.getElementById('darkToggle').setAttribute('title', label);
});

// ── UTILITIES
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT
updateCounts();
render();

/* ── WAKE LOCK ── */
let wakeLock = null;
async function requestWakeLock() {
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    const btn = document.getElementById('wakeToggle');
    btn.classList.add('active');
    btn.setAttribute('aria-label', 'Keep Awake On');
    btn.setAttribute('title', 'Keep Awake On');
    wakeLock.addEventListener('release', () => {
      wakeLock = null;
      const b = document.getElementById('wakeToggle');
      b.classList.remove('active');
      b.setAttribute('aria-label', 'Keep Awake Off');
      b.setAttribute('title', 'Keep Awake Off');
    });
  } catch (e) { /* not supported or denied */ }
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
  const btn = document.getElementById('wakeToggle');
  btn.classList.remove('active');
  btn.setAttribute('aria-label', 'Keep Awake Off');
  btn.setAttribute('title', 'Keep Awake Off');
}
document.getElementById('wakeToggle').addEventListener('click', () => {
  if (wakeLock) { releaseWakeLock(); } else { requestWakeLock(); }
});
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' &&
      document.getElementById('wakeToggle').classList.contains('active')) {
    requestWakeLock();
  }
});

/* ── TOAST ── */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

/* ── SHARE ── */
let currentRecipeUuid = null;
document.getElementById('shareBtn').addEventListener('click', async () => {
  if (!currentRecipeUuid) return;
  const title = document.getElementById('modalTitle').textContent;
  const url = location.origin + location.pathname + '#recipe-' + currentRecipeUuid;
  if (navigator.share) {
    try { await navigator.share({ title, url }); } catch (e) { /* cancelled */ }
  } else {
    function showCopied() {
      const btn = document.getElementById('shareBtn');
      const orig = btn.innerHTML;
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
      setTimeout(() => { btn.innerHTML = orig; }, 2000);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      try {
        await navigator.clipboard.writeText(url);
        showCopied();
      } catch (e) {
        prompt('Copy this link:', url);
      }
    } else {
      /* execCommand fallback for Firefox and older browsers */
      const ta = document.createElement('textarea');
      ta.value = url;
      ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      try { document.execCommand('copy'); showCopied(); }
      catch (e) { prompt('Copy this link:', url); }
      document.body.removeChild(ta);
    }
  }
});

/* ── DEEP LINK: auto-open recipe from URL hash ── */
(function() {
  const hash = location.hash;
  if (!hash.startsWith('#recipe-')) return;
  const uuid = hash.slice(8);
  const recipe = RECIPES.find(r => r.uuid === uuid);
  if (recipe) { setTimeout(() => openModal(recipe), 80); }
})();
