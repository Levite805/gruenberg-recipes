<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Gruenberg Recipe Collection</title>
<style>
:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --border: #E4DED5;
  --accent: #3D6B4F;
  --accent-light: #EBF2ED;
  --accent-dark: #2B4F38;
  --text: #1C1C1C;
  --text-sub: #6B6560;
  --text-muted: #9C9490;
  --cookbook: #7A4F28;
  --cookbook-bg: #FDF4EC;
  --cookbook-border: #E8CEAE;
  --chip-bg: #EDEBE6;
  --chip-hover: #E4E0D8;
  --header-bg: rgba(255,255,255,0.95);
  --search-focus-bg: #ffffff;
  --shadow: 0 1px 4px rgba(0,0,0,0.08), 0 2px 12px rgba(0,0,0,0.05);
  --shadow-hover: 0 4px 16px rgba(0,0,0,0.12);
  --radius: 12px;
  --radius-sm: 8px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
html.dark {
  --bg: #171714;
  --surface: #222220;
  --border: #333330;
  --accent: #5A9B72;
  --accent-light: #1A2E22;
  --accent-dark: #7BC49A;
  --text: #EDEAE4;
  --text-sub: #9A948E;
  --text-muted: #665F58;
  --cookbook: #C98A55;
  --cookbook-bg: #231910;
  --cookbook-border: #4A3520;
  --chip-bg: #2C2C28;
  --chip-hover: #383832;
  --header-bg: rgba(26,26,23,0.95);
  --search-focus-bg: #2C2C28;
  --shadow: 0 1px 4px rgba(0,0,0,0.3), 0 2px 12px rgba(0,0,0,0.2);
  --shadow-hover: 0 4px 16px rgba(0,0,0,0.4);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── HEADER ── */
.site-header {
  position: sticky; top: 0; z-index: 100;
  background: var(--header-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px 10px;
}
.header-inner {
  max-width: 1200px; margin: 0 auto;
  display: flex; flex-direction: column; gap: 12px;
}
.header-top {
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.site-title {
  font-size: 1.25rem; font-weight: 700; color: var(--text); letter-spacing: -0.02em;
  white-space: nowrap;
}
.site-subtitle {
  font-size: 0.8rem; color: var(--text-muted); font-weight: 400;
}
.search-wrap {
  position: relative; flex: 1; max-width: 400px;
}
.search-wrap svg {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px; color: var(--text-muted); pointer-events: none;
}
#search {
  width: 100%; padding: 9px 12px 9px 38px;
  border: 1.5px solid var(--border); border-radius: 24px;
  font-size: 0.9rem; background: var(--bg); color: var(--text);
  outline: none; transition: border-color 0.2s;
  -webkit-appearance: none;
}
#search:focus { border-color: var(--accent); background: var(--search-focus-bg); }
#search::placeholder { color: var(--text-muted); }

/* ── FILTER CHIPS ── */
.filter-bar-wrap {
  overflow: hidden; position: relative;
}
.filter-bar {
  display: flex; gap: 8px; overflow-x: auto; padding: 4px 0 8px;
  scrollbar-width: none; -ms-overflow-style: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
  font-size: 0.82rem; font-weight: 500; cursor: pointer;
  background: var(--chip-bg); color: var(--text-sub);
  border: 1.5px solid transparent; transition: all 0.15s;
  white-space: nowrap; user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.chip:hover { background: var(--chip-hover); }
.chip.active {
  background: var(--accent); color: #fff; border-color: var(--accent);
}
.chip .count {
  display: inline-block; margin-left: 5px;
  font-size: 0.72rem; opacity: 0.75;
}

/* ── MAIN LAYOUT ── */
main {
  max-width: 1200px; margin: 0 auto; padding: 20px 16px 40px;
}
.results-meta {
  font-size: 0.82rem; color: var(--text-muted); margin-bottom: 16px;
}

/* ── RECIPE GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
@media (max-width: 1024px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  .grid { grid-template-columns: 1fr; gap: 12px; }
  main { padding: 14px 12px 32px; }
}

/* ── RECIPE CARD ── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px;
  cursor: pointer; transition: box-shadow 0.2s, transform 0.15s;
  display: flex; flex-direction: column; gap: 10px;
  -webkit-tap-highlight-color: transparent;
}
.card:hover {
  box-shadow: var(--shadow-hover); transform: translateY(-1px);
}
.card:active { transform: translateY(0); box-shadow: var(--shadow); }
.card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.card-title {
  font-size: 0.97rem; font-weight: 600; color: var(--text);
  line-height: 1.35; letter-spacing: -0.01em;
}
.cookbook-badge {
  flex-shrink: 0; font-size: 0.7rem; font-weight: 600;
  color: var(--cookbook); background: var(--cookbook-bg);
  padding: 3px 8px; border-radius: 20px; border: 1px solid var(--cookbook-border);
  margin-top: 2px;
}
.card-cat {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 0.73rem; font-weight: 500; color: var(--accent);
  background: var(--accent-light); padding: 3px 9px; border-radius: 12px;
  width: fit-content;
}
.card-attribution {
  font-size: 0.78rem; color: var(--cookbook); font-style: italic;
}
.card-preview {
  font-size: 0.83rem; color: var(--text-sub); line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.card.has-photo {
  position: relative; overflow: hidden;
  min-height: 190px; justify-content: flex-end;
  background-size: cover; background-position: center; background-repeat: no-repeat;
}
.card.has-photo::before {
  content: ""; position: absolute; inset: 0; z-index: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.35) 55%, rgba(0,0,0,0.82) 100%);
}
.card.has-photo > * { position: relative; z-index: 1; }
.card.has-photo .card-title { color: #fff; }
.card.has-photo .card-cat {
  background: rgba(255,255,255,0.22); color: #fff;
  -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px);
}
.card.has-photo .card-attribution { color: rgba(255,255,255,0.88); }
.card.has-photo .card-preview { color: rgba(255,255,255,0.82); }
.card.has-photo .cookbook-badge {
  background: rgba(255,255,255,0.22); color: #fff; border-color: rgba(255,255,255,0.4);
}
.no-results {
  grid-column: 1 / -1; text-align: center;
  padding: 60px 20px; color: var(--text-muted);
  font-size: 0.95rem;
}

/* ── MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  overscroll-behavior: none;
}
.modal-overlay.open { display: flex; align-items: flex-end; justify-content: center; }
@media (min-width: 700px) {
  .modal-overlay.open { align-items: center; }
}
.modal {
  background: var(--surface); border-radius: 20px 20px 0 0;
  width: 100%; max-width: 720px;
  max-height: 92vh; overflow-y: auto;
  padding: 0;
  animation: slideUp 0.28s cubic-bezier(0.34,1.2,0.64,1);
  overscroll-behavior: contain;
}
@media (min-width: 700px) {
  .modal { border-radius: 20px; max-height: 88vh; }
}
@keyframes slideUp {
  from { transform: translateY(40px); opacity: 0.7; }
  to   { transform: translateY(0);    opacity: 1; }
}
.modal-header {
  position: sticky; top: 0; background: var(--surface);
  padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 12px;
  z-index: 1;
}
.modal-header-meta { flex: 1; min-width: 0; }
.modal-header-actions { flex-shrink: 0; display: flex; align-items: center; gap: 8px; }
.modal-title {
  font-size: 1.2rem; font-weight: 700; color: var(--text);
  letter-spacing: -0.02em; line-height: 1.3; margin-bottom: 8px;
}
.modal-badges { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.modal-cat {
  font-size: 0.75rem; font-weight: 500; color: var(--accent);
  background: var(--accent-light); padding: 3px 10px; border-radius: 12px;
}
.modal-attr {
  font-size: 0.75rem; font-style: italic; color: var(--cookbook);
  background: var(--cookbook-bg); padding: 3px 10px; border-radius: 12px;
  border: 1px solid var(--cookbook-border);
}
.modal-source {
  font-size: 0.72rem; color: var(--cookbook);
  background: var(--cookbook-bg); padding: 3px 10px; border-radius: 12px;
  border: 1px solid var(--cookbook-border);
}
.close-btn {
  flex-shrink: 0; width: 36px; height: 36px;
  border: none; background: var(--chip-bg); border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--text-sub); transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.close-btn:hover { background: var(--chip-hover); }
.modal-body { padding: 20px 24px 32px; }
.recipe-image {
  width: 100%; max-width: 560px; display: block;
  margin: 0 auto 24px; border-radius: var(--radius);
  border: 1px solid var(--border);
}
.photo-carousel {
  position: relative; width: 100%; max-width: 560px;
  margin: 0 auto 24px; border-radius: var(--radius);
  overflow: hidden; border: 1px solid var(--border);
  background: var(--chip-bg);
}
.photo-carousel .carousel-track {
  display: flex; transition: transform 0.25s ease;
}
.photo-carousel .carousel-slide {
  flex: 0 0 100%; width: 100%;
}
.photo-carousel .carousel-slide img {
  width: 100%; display: block;
}
.carousel-arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 34px; height: 34px; border-radius: 50%; border: none;
  background: rgba(0,0,0,0.45); color: #fff; font-size: 20px; line-height: 1;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s; padding: 0;
}
.carousel-arrow:hover { background: rgba(0,0,0,0.65); }
.carousel-arrow.prev { left: 10px; }
.carousel-arrow.next { right: 10px; }
.carousel-dots {
  position: absolute; bottom: 10px; left: 0; right: 0;
  display: flex; justify-content: center; gap: 6px;
}
.carousel-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: rgba(255,255,255,0.55); border: none; cursor: pointer; padding: 0;
}
.carousel-dot.active { background: #fff; }

/* ── DARK MODE TOGGLE ── */
.dark-toggle {
  flex-shrink: 0; width: 36px; height: 36px;
  border: 1.5px solid var(--border); background: var(--chip-bg);
  border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-sub); transition: background 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.dark-toggle:hover { background: var(--chip-hover); border-color: var(--accent); }
.dark-toggle svg { width: 16px; height: 16px; }
.icon-moon { display: block; }
.icon-sun  { display: none; }
html.dark .icon-moon { display: none; }
html.dark .icon-sun  { display: block; }

/* ── HEADER CONTROLS GROUP ── */
.header-controls {
  display: flex; align-items: center; gap: 6px; flex-shrink: 0;
}

/* ── WAKE LOCK ── */
.wake-toggle {
  flex-shrink: 0; width: 36px; height: 36px;
  border: 1.5px solid var(--border); background: var(--chip-bg);
  border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-sub); transition: background 0.15s, border-color 0.15s, color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.wake-toggle:hover { background: var(--chip-hover); border-color: var(--accent); }
.wake-toggle svg { width: 16px; height: 16px; }
.wake-toggle.active {
  background: var(--accent-light); border-color: var(--accent); color: var(--accent);
}

/* ── SHARE BUTTON ── */
.share-btn {
  flex-shrink: 0;
  border: 1.5px solid var(--border); background: var(--chip-bg);
  border-radius: 20px; padding: 0 14px; height: 36px;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  color: var(--text-sub); font-size: 0.82rem; font-weight: 600;
  transition: background 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent; white-space: nowrap;
}
.share-btn:hover { background: var(--chip-hover); border-color: var(--accent); color: var(--accent); }
.share-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px);
  background: #1C1C1C; color: #fff; font-size: 0.85rem; font-weight: 500;
  padding: 10px 20px; border-radius: 24px;
  opacity: 0; pointer-events: none; z-index: 300;
  transition: opacity 0.2s, transform 0.2s;
  white-space: nowrap;
}
html.dark .toast { background: #EDEAE4; color: #1C1C1C; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── RECIPE MARKDOWN ── */
.recipe-content { line-height: 1.7; }
.recipe-content h1 {
  font-size: 1.1rem; font-weight: 700; color: var(--text);
  margin: 0 0 16px; letter-spacing: -0.02em;
}
.recipe-content h2 {
  font-size: 1rem; font-weight: 700; color: var(--text);
  margin: 24px 0 10px; padding-bottom: 6px;
  border-bottom: 1.5px solid var(--border);
}
.recipe-content h3 {
  font-size: 0.9rem; font-weight: 600; color: var(--accent-dark);
  margin: 20px 0 8px; text-transform: uppercase; letter-spacing: 0.05em;
  font-size: 0.78rem;
}
.recipe-content h4 {
  font-size: 0.88rem; font-weight: 600; color: var(--text);
  margin: 16px 0 6px;
}
.recipe-content p {
  font-size: 0.9rem; color: var(--text-sub); margin: 0 0 12px;
}
.recipe-content ul, .recipe-content ol {
  margin: 6px 0 14px 18px; font-size: 0.9rem;
}
.recipe-content li {
  color: var(--text); margin-bottom: 5px; line-height: 1.6;
}
.recipe-content strong { font-weight: 600; color: var(--text); }
.recipe-content em { font-style: italic; color: var(--text-sub); }
.recipe-content hr {
  border: none; border-top: 1.5px solid var(--border); margin: 20px 0;
}
.recipe-content .note-block {
  font-size: 0.84rem; color: var(--text-sub); font-style: italic;
  background: var(--bg); border-left: 3px solid var(--border);
  padding: 10px 14px; border-radius: 0 8px 8px 0; margin: 12px 0;
}

/* ── TABLE SUPPORT ── */
.recipe-content table {
  width: 100%; border-collapse: collapse; margin: 12px 0 20px;
  font-size: 0.85rem;
}
.recipe-content th {
  background: var(--bg); padding: 8px 12px; text-align: left;
  font-weight: 600; border-bottom: 2px solid var(--border);
  color: var(--text); font-size: 0.8rem;
}
.recipe-content td {
  padding: 7px 12px; border-bottom: 1px solid var(--border); color: var(--text);
}
.recipe-content tr:last-child td { border-bottom: none; }
.recipe-content tr:hover td { background: var(--bg); }

/* ── TOOLS BUTTON ── */
.tools-toggle {
  flex-shrink: 0; width: 36px; height: 36px;
  border: 1.5px solid var(--border); background: var(--chip-bg);
  border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-sub); transition: background 0.15s, border-color 0.15s, color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.tools-toggle:hover { background: var(--chip-hover); border-color: var(--accent); }
.tools-toggle svg { width: 16px; height: 16px; }

/* ── TOOLS MODAL TABS ── */
.tools-tabs {
  display: flex; gap: 4px; padding: 0 20px; border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
.tools-tab {
  border: none; background: none; padding: 12px 12px 10px; font-size: 0.85rem;
  font-weight: 600; color: var(--text-sub); cursor: pointer;
  border-bottom: 2px solid transparent; white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.tools-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tools-panel { display: none; padding: 20px 24px 32px; }
.tools-panel.active { display: block; }
.tools-panel h4 {
  font-size: 0.78rem; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.05em; margin: 0 0 10px;
}
.tools-hint { font-size: 0.8rem; color: var(--text-muted); margin-top: 10px; }

/* ── SHARED TOOL FORM CONTROLS ── */
.conv-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.conv-input, .conv-select {
  padding: 9px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg); color: var(--text); font-size: 0.9rem; outline: none;
  -webkit-appearance: none;
}
.conv-input:focus, .conv-select:focus { border-color: var(--accent); }
.conv-select { flex: 1; min-width: 120px; }
.conv-arrow { color: var(--text-muted); flex-shrink: 0; }
.conv-result {
  font-size: 1.25rem; font-weight: 700; color: var(--accent);
  margin-top: 4px; word-break: break-word;
}

/* ── SUBSTITUTIONS ── */
#subSearch { width: 100%; margin-bottom: 14px; }
.sub-list { display: flex; flex-direction: column; }
.sub-item { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
.sub-item:last-child { border-bottom: none; }
.sub-item .sub-item-title { font-weight: 600; color: var(--text); margin-bottom: 3px; }
.sub-item .sub-item-swap { color: var(--text-sub); }
.sub-empty { color: var(--text-muted); font-size: 0.88rem; padding: 12px 0; }

/* ── TIMER ── */
.timer-presets { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.timer-preset-btn {
  border: 1.5px solid var(--border); background: var(--chip-bg); border-radius: 20px;
  padding: 7px 14px; font-size: 0.85rem; font-weight: 500; color: var(--text-sub); cursor: pointer;
  -webkit-tap-highlight-color: transparent; transition: background 0.15s, border-color 0.15s;
}
.timer-preset-btn:hover { background: var(--chip-hover); border-color: var(--accent); }
.timer-custom { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.timer-custom .conv-input { flex: 1; min-width: 100px; }
.timer-add-btn {
  border: 1.5px solid var(--accent); background: var(--accent); color: #fff;
  border-radius: var(--radius-sm); padding: 9px 16px; font-size: 0.85rem; font-weight: 600;
  cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent;
}
.timer-add-btn:hover { background: var(--accent-dark); }
.timer-list { display: flex; flex-direction: column; gap: 10px; }
.timer-card {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  border: 1.5px solid var(--border); border-radius: var(--radius); padding: 12px 16px;
  background: var(--chip-bg); transition: background 0.2s, border-color 0.2s;
}
.timer-card.done { border-color: var(--cookbook); background: var(--cookbook-bg); animation: timerPulse 1s infinite; }
@keyframes timerPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
.timer-card-info { min-width: 0; }
.timer-card-label { font-size: 0.82rem; color: var(--text-sub); margin-bottom: 2px; }
.timer-time { font-size: 1.3rem; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
.timer-card-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.timer-btn {
  border: 1.5px solid var(--border); background: var(--surface); border-radius: 50%;
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text-sub); -webkit-tap-highlight-color: transparent;
}
.timer-btn:hover { border-color: var(--accent); color: var(--accent); }
.timer-btn svg { width: 14px; height: 14px; }

/* ── RECIPE SCALE BAR ── */
.scale-bar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  background: var(--accent-light); margin: -20px -24px 20px;
}
.scale-label { font-size: 0.8rem; font-weight: 600; color: var(--text-sub); flex-shrink: 0; }
.scale-btn {
  border: 1.5px solid var(--border); background: var(--surface); border-radius: 16px;
  padding: 5px 12px; font-size: 0.82rem; font-weight: 500; color: var(--text-sub); cursor: pointer;
  -webkit-tap-highlight-color: transparent; transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.scale-btn:hover { border-color: var(--accent); }
.scale-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }
.scale-custom-input {
  width: 64px; padding: 5px 8px; border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 0.82rem; background: var(--surface); color: var(--text); outline: none;
}
.scale-custom-input:focus { border-color: var(--accent); }
</style>
</head>

<script>
const RECIPES = [{"uuid": "2syhsz57yzxpjtkbtu4k3ha7hy", "title": "Smoked Asparagus", "ainfo": "Smoked Asparagus", "category": "smoked", "tags": ["David Recipes"], "cookbook": false, "attribution": "", "preview": "2 LB asparagus, white ends trimmed off", "notes": "# Smoked Asparagus\n\n### Ingredients\n* **2 LB** asparagus, white ends trimmed off\n* **1.5 tbsp** olive oil\n* **1 clove** garlic, diced\n* Juice of **½** medium lemon\n* Zest of **1** medium lemon\n* **½ tsp** salt\n* **¼ tsp** fresh cracked black pepper\n* **2 tbsp** parmesan cheese\n* Sprinkled mustard seed"}, {"uuid": "lu5lfxba7k5x4mmioi6n2xbkla", "title": "Apple Pie", "ainfo": "Miranda's Crazy Modular Apple Pie Recipe", "category": "desserts", "tags": [], "cookbook": false, "attribution": "", "preview": "2 ¼ cups all-purpose flour (or substitute up to half with white whole wheat flour)", "notes": "# Miranda's Crazy Modular Apple Pie Recipe\n\n---\n\n## Part 1: The Pie Crust\n\n### Crust Ingredients\n* **2 ¼ cups** all-purpose flour (or substitute up to half with white whole wheat flour)\n* **4 Tbl** cold butter, cubed\n* *Note: If using a pre-made alternative, use 1 package of Double Crust Pie Pastry.*\n\n### Egg Wash & Topping\n* **1** egg white, beaten\n* **1–2 teaspoons** coarse sugar\n\n---\n\n## Part 2: Choose Your Filling\n\n### Option A: Spiced Apple Filling (Inspired Taste Style)\n* **4 to 4 ¼ pounds** baking apples (7 to 8 apples), peeled and sliced ¼-inch thick\n* **½ cup** (100 grams) light or dark brown sugar\n* **½ cup** (100 grams) granulated sugar\n* **¼ teaspoon** fine sea salt\n* **1 teaspoon** ground cinnamon\n* **¼ teaspoon** ground ginger\n* **¼ teaspoon** ground cardamom\n* **¼ teaspoon** ground allspice\n* **¼ teaspoon** freshly grated nutmeg\n* **2 tablespoons** cornstarch (or 4 tablespoons tapioca flour/starch)\n* **1 tablespoon** butter, cut into small pieces\n\n### Option B: Classic Sweet Apple Filling (Spend with Pennies Style)\n* **6–7 cups** apples, peeled and sliced\n* **1 tablespoon** lemon juice\n* **½ cup** granulated sugar\n* **3 tablespoons** flour\n* **½ teaspoon** ground cinnamon\n* **⅛ teaspoon** nutmeg\n* **1 tablespoon** butter, cut into small pieces\n\n### Option C: Vanilla-Infused Apple Filling\n* **8 cups** peeled apples, sliced ¼-inch thick (6–8 apples, approx. 3.5 pounds)\n* **1 teaspoon** vanilla extract\n* **¼ cup** all-purpose flour\n* **¼ cup to ½ cup** granulated sugar (adjust based on apple sweetness)\n* **¼ cup** brown sugar\n* **1 teaspoon** ground cinnamon\n* **¼ teaspoon** ground nutmeg\n* **¼ teaspoon** salt\n* **1 tablespoon** butter, cut into small pieces\n\n---\n\n## Part 3: Assembly & Baking Instructions\n\n### Step 1: Prep the Oven and Crust\n1. Position an oven rack towards the center of the oven, and heat the oven to 400°F (200°C).\n2. Roll out your bottom crust pastry dough and line a 9-inch pie plate. \n3. Roll out the top crust pastry round (or cut into strips if making a lattice top), place it on a parchment-lined baking sheet, and keep it chilled in the refrigerator until needed.\n\n### Step 2: Mix the Filling\n1. Toss your peeled and sliced apples with any liquid flavorings (like lemon juice or vanilla extract) required for your chosen filling option.\n2. In a separate bowl, combine all the dry sugars, thickeners (flour or cornstarch), and ground spices.\n3. Pour the dry mixture over the apples and toss thoroughly until every slice is evenly coated.\n\n### Step 3: Assemble the Pie\n1. Transfer the coated apples into the prepared bottom crust, using your hands to tightly pack them down into the pie. Mound them high until they match the height of the pie crust edge.\n2. Pour any remaining juices left at the bottom of the mixing bowl right over the apples.\n3. Take your small pieces of butter and dot them evenly across the top of the mounded apples.\n4. Place the top crust over the filling, or weave the strips into a lattice pattern. Seal and crimp the edges tightly, cutting away any excess dough.\n\n### Step 4: Final Flourish & Bake\n1. Cut 4–5 slits in the top crust to allow steam to escape. \n2. Brush the top pastry evenly with your beaten egg white and sprinkle generously with the coarse sugar.\n3. Place the pie onto a baking sheet lined with parchment paper. Bake at 400°F–425°F for the first 15 minutes, then reduce the heat to 375°F.\n4. Continue baking for an additional 50 to 60 minutes (about 75 minutes total bake time), rotating the pan occasionally for even browning.\n5. **The Shielding Trick:** If the pie crust is browning too quickly, shape a sheet of foil over an upside-down bowl to make a quick dome and tent it over the pie for the rest of the bake.\n\n### Step 5: Check Doneness & Serve\n1. The pie is ready when the thick apple juices are bubbling actively through the vents of the crust. \n2. To test precisely, slide a thermometer into the middle of the pie; it is done when it reads 195°F (90°C) and the apples feel tender rather than crunchy.\n3. Let the pie cool completely without slicing into it for at least 1 hour to allow the internal setting process to complete. Serve warm with vanilla ice cream."}, {"uuid": "6rsikwbsmliphcthuzobqhy6uu", "title": "Artisan Sourdough Bread 1 (The Perfect Loaf)", "ainfo": "Artisan Sourdough Bread (The Perfect Loaf)", "category": "sourdough", "tags": [], "cookbook": false, "attribution": "", "preview": "30g medium-protein bread flour", "notes": "# Artisan Sourdough Bread (The Perfect Loaf)\n\n### Ingredients\n\n#### For the Levain:\n* **30g** medium-protein bread flour\n* **30g** whole wheat flour\n* **60g** water\n* **30g** ripe sourdough starter\n\n#### For the Main Dough:\n* **822g** medium-protein bread flour\n* **64g** whole wheat flour\n* **745g** total water (divided into **650g** for autolyse and **95g** for mixing)\n* **17g** sea salt\n* **151g** ripe levain (from step 1)\n\n---\n\n### Instructions\n\n#### 1. Levain (9:00 a.m.)\nIn a small container, mix the levain ingredients and keep at 78°F (25°C) for 5 hours.\n\n#### 2. Autolyse (12:00 p.m.)\nIn a medium mixing bowl, add 822g medium-protein bread flour, 64g whole wheat flour, and 650g water, and mix until no dry bits remain. Cover the bowl and let rest for 2 hours.\n\n#### 3. Mix (2:00 p.m.)\nTo the mixing bowl holding your dough, add 95g water (holding back any as necessary if the dough is too wet), 17g sea salt, and the ripe levain. Transfer your dough to a bulk fermentation container and cover.\n\n#### 4. Bulk Fermentation (2:15 p.m. to 6:15 p.m.)\nGive the dough 6 sets of stretch and folds. The first three sets are at 15-minute intervals, and the last three sets are at 30-minute intervals.\n\n#### 5. Divide and Preshape (6:15 p.m.)\nLightly flour your work surface and scrape out your dough. Using your bench knife, divide the dough in half. Lightly shape each half into a round shape. Let the dough rest for 30 minutes, uncovered.\n\n#### 6. Shape (6:45 p.m.)\nShape the dough into a round (boule) or oval (batard) and place it in proofing baskets. Cover the baskets with a reusable plastic bag.\n\n#### 7. Proof (7:25 p.m. to 9:00 a.m. the next day)\nCover proofing baskets with reusable plastic and seal them shut. Then, place both baskets into the refrigerator and proof overnight.\n\n#### 8. Bake (Preheat oven at 8:00 a.m., bake at 9:00 a.m.)\nPreheat your oven with a combo cooker or Dutch oven inside to 450°F (230°C). Remove your dough from the fridge, score it, and transfer it to the preheated combo cooker. Place the cooker in the oven, cover with the lid, and bake for 20 minutes. \n\nAfter this time, remove the lid (you can keep it in the oven or remove it) and continue to bake for 30 minutes longer. When done, the internal temperature should be around 208°F (97°C). Let the loaves cool for 2 hours on a wire rack before slicing."}, {"uuid": "hl43r4hbtmyekedxlunognyleq", "title": "Artisan Sourdough Bread 2 (The Perfect Loaf)", "ainfo": "Artisan Sourdough Bread (The Perfect Loaf)", "category": "sourdough", "tags": [], "cookbook": false, "attribution": "", "preview": "30g medium-protein flour", "notes": "# Artisan Sourdough Bread (The Perfect Loaf)\n\n### Ingredients\n\n#### For the Levain:\n* **30g** medium-protein flour\n* **30g** whole wheat flour\n* **60g** water\n* **30g** ripe sourdough starter\n\n#### For the Main Dough:\n* **822g** medium-protein bread flour\n* **64g** whole wheat flour\n* **650g** Water 1\n* **95g** Water 2\n* **17g** fine sea salt\n* **151g** ripe liquid levain\n\n### Instructions\n1. **Autolyse:** Mix the flour and water in a bowl until all the dry bits are incorporated, then cover. Ensure all dry flour is hydrated—store near levain (we want the dough's temperature to remain warm).\n2. **Mix:** Add the remaining ingredients to your bowl, adding water 2 carefully. Avoid adding water if the dough feels too wet or soupy at any point.\n3. **Develop:** Perform folds for about 2–3 minutes directly in the bowl. Grab under one side, pull up, and fold over to the other side, then rotate the bowl a bit and repeat. Do this process 30 times or so. At the end, the dough should still be shaggy, but it will be more smooth and will start to hold itself together more in the bowl. *(Alternatively, a slap & fold technique can be used.)*"}, {"uuid": "2s7koxijm5dvu275sfcwrvqc4i", "title": "Asian Asparagus", "ainfo": "Sesame Garlic Asparagus", "category": "sides", "tags": ["David Recipes"], "cookbook": false, "attribution": "", "preview": "1 T toasted sesame oil", "notes": "# Sesame Garlic Asparagus\n\n### Ingredients\n* **1 T** toasted sesame oil\n* **1 T** soy sauce\n* **6 cloves** garlic, minced\n* **1 t** brown sugar\n* **1 ½ pounds** fresh asparagus, trimmed\n* **2 T** toasted sesame seeds\n\n### Instructions\n1. In a small bowl, whisk together the toasted sesame oil, soy sauce, minced garlic, and brown sugar.\n2. Toss the trimmed fresh asparagus in the sauce mixture until well coated.\n3. Cook or stir-fry until the asparagus is tender-crisp, then garnish with toasted sesame seeds before serving."}, {"uuid": "s6e2jcjpjf74ugb4iu5zjhm5di", "title": "Ba Tay So (Bánh Patê Sô)", "ainfo": "Ba Tay So", "category": "asian", "tags": [], "cookbook": true, "attribution": "Thu", "preview": "Thu's Recipe Prepared", "notes": "## Ba Tay So\n*Thu's Recipe Prepared*\n\n### Details\n* **Oven Temp:** Preheat oven to 425°F\n\n### Things You Need\n* 1/2 lb ground turkey\n* 1 large sweet onion, finely chopped\n* 2 green onions / cilantro, finely chopped\n* Salt and pepper to taste (or veggie seasoning)\n* 1 package of Pepperidge Farms Puff Pastry\n\n### Directions\n1. Mix ground turkey, sweet onion, green onions/cilantro, and seasonings together.\n2. Fry the mixture in a pan until completely browned.\n3. Cut the puff pastry package into 3 long pieces, then cut each long piece into 4 smaller pieces (yielding 12 pieces total).\n4. Wrap a portion of the meat contents into each pastry piece and seal the edges tightly with your fingers.\n5. Place on a cookie sheet and bake until golden brown, turning the pastries halfway through the cooking process."}, {"uuid": "6y7tzeycsrhnembfnwdhyxr6cq", "title": "Baked Chicken Leg Quarters", "ainfo": "Baked Chicken Leg Quarters", "category": "mains", "tags": [], "cookbook": false, "attribution": "", "preview": "4 chicken leg quarters", "notes": "# Baked Chicken Leg Quarters\n\n### Ingredients\n* **4** chicken leg quarters\n* **1.5 tbs** Italian seasoning\n* **1.5 tsp** kosher salt (adjust to taste)\n* **1 tsp** onion powder\n* **1 tsp** garlic powder\n* **1 tsp** ground mustard\n* **½ tsp** paprika\n* **½ tsp** ground black pepper\n* **1 tbs** olive oil\n\n### Instructions\n1. Preheat oven to 425°F (218°C) and prepare a baking sheet by lining it with aluminum foil.\n2. In a small bowl, mix all dry ingredients together to create your seasoning rub.\n3. Trim the chicken leg quarters of any excess skin and fat, then pat them completely dry with paper towels.\n4. Lightly brush both sides of the chicken quarters with olive oil and liberally apply the prepared seasoning rub.\n5. With the skin side up, press the seasoning rub directly into the chicken skin and apply a final brushing of oil so nothing dries out too quickly.\n6. Bake in the preheated oven for 35 to 45 minutes or until the internal temperature reads 185°F on an instant-read thermometer.\n7. When the chicken is done, remove it from the oven and let it rest for 5 to 10 minutes before serving."}, {"uuid": "gpkddssnzuq5gq5mpakcxuhquq", "title": "Banana Bread", "ainfo": "Banana Bread", "category": "desserts", "tags": [], "cookbook": true, "attribution": "Grandma Marty", "preview": "Grandma Marty's Recipe", "notes": "## Banana Bread\n*Grandma Marty's Recipe*\n\n### Details\n* **Prep Time:** 5 min\n* **Cook Time:** \n  * 15 min @ 300°F\n  * 30 min @ 350°F\n* **Yield:** Use 2 floured bread pans\n\n### Things You Need\n* 3 over-ripe bananas\n* 5 tbsp milk\n* 1 cup granulated sugar\n* 2 cups flour\n* 2 eggs\n* 1/2 tsp salt\n* 1 tsp vanilla extract\n* 1 tsp baking soda\n* 1/2 cup vegetable oil"}, {"uuid": "3yyihwnzdl6uotnseaotidmfxq", "title": "Bang Bang Chicken Skewers", "ainfo": "Bang Bang Chicken Skewers", "category": "asian", "tags": [], "cookbook": false, "attribution": "", "preview": "1 lb boneless, skinless chicken breasts or thighs (cut into bite-sized cubes)", "notes": "# Bang Bang Chicken Skewers\n\n### Ingredients\n\n#### For the Marinade:\n* **1 lb** boneless, skinless chicken breasts or thighs (cut into bite-sized cubes)\n* **¼ cup** mayonnaise\n* **2 tablespoons** sweet chili sauce\n* **1 tablespoon** Sriracha (adjust to taste)\n* **1 tablespoon** soy sauce\n* **1 teaspoon** rice vinegar\n* **1 clove** garlic (minced)\n* **1 teaspoon** honey (optional, for added sweetness)\n\n#### For Serving:\n* Wooden or metal skewers\n* Green onions (chopped, for garnish)\n* Sesame seeds (for garnish)\n* Lime wedges (for serving)\n\n#### Optional Dipping Sauce:\n* **¼ cup** mayonnaise\n* **1–2 tablespoons** sweet chili sauce\n* **1 teaspoon** Sriracha\n\n### Instructions\n\n#### Step 1: Prepare the Skewers\nIf using wooden skewers, soak them in water for at least 30 minutes to prevent burning on the grill. Thread the chicken cubes onto the skewers, leaving a small space between each piece for even cooking.\n\n#### Step 2: Make the Marinade\nIn a large bowl, whisk together the mayonnaise, sweet chili sauce, Sriracha, soy sauce, rice vinegar, minced garlic, and honey (if using). Reserve about ¼ cup of the marinade for basting or serving as a dipping sauce.\n\n#### Step 3: Marinate the Chicken\nAdd the chicken skewers to the bowl with the remaining marinade, tossing to coat evenly. Cover and refrigerate for at least 30 minutes (or up to 2 hours) to allow the flavors to penetrate the chicken.\n\n#### Step 4: Grill the Skewers\nPreheat your grill or grill pan over medium-high heat. Lightly oil the grates to prevent sticking. Place the skewers on the grill and cook for 3–4 minutes per side, or until the chicken is golden brown and cooked through (internal temperature should reach 165°F/74°C). Baste with the reserved marinade during the last minute of cooking for extra flavor.\n\n#### Step 5: Garnish and Serve\nTransfer the skewers to a serving platter. Garnish with chopped green onions and sesame seeds. Serve with lime wedges and the optional dipping sauce on the side."}, {"uuid": "u753fc4qdbdpjlp24xe6tj3afq", "title": "Banh Mi (Bakers Royale Version)", "ainfo": "Grilled Beef Banh Mi (Bakers Royale Version)", "category": "asian", "tags": [], "cookbook": false, "attribution": "", "preview": "1 lb. well-marbled tri-tip, sliced against the grain to ¼-inch thickness", "notes": "# Grilled Beef Banh Mi (Bakers Royale Version)\n\n### Ingredients\n\n#### Beef & Marinade\n* **1 lb.** well-marbled tri-tip, sliced against the grain to ¼-inch thickness\n* **2 large** garlic cloves\n* **1** shallot\n* **1 tablespoon** dark brown sugar\n* **1 tablespoon** fish sauce\n* **1 tablespoon** Mirin\n* **1 tablespoon** light soy sauce\n* **2 tablespoon** canola oil\n\n#### Sandwich Assembly\n* **4** French rolls, halved horizontally\n* **¼ cup** Sriracha mayonnaise\n* **1 cup** pickled Vietnamese slaw\n* **6 to 8** cilantro sprigs\n* **4** jalapeños, sliced\n\n### Instructions\n1. **Make the Beef:** In a mortar and pestle, crush the garlic and shallots into a smooth paste. Transfer the paste to a medium-sized bowl and add the brown sugar, fish sauce, Mirin, soy sauce, and canola oil. Whisk to combine.\n2. Add the sliced beef to the marinade, making sure each slice is completely and evenly coated. Cover with plastic wrap and marinate for at least an hour or overnight."}, {"uuid": "te2svyg4brrffbmzi5ijzam4ym", "title": "Banh Mi (Version 2)", "ainfo": "Beef Banh Mi (Version 2)", "category": "asian", "tags": [], "cookbook": false, "attribution": "", "preview": "1 lb sirloin, sliced very thin (ribeye, strip steak, or pre-sliced cheesesteak beef may be substituted)", "notes": "# Beef Banh Mi (Version 2)\n\n### Ingredients\n* **1 lb** sirloin, sliced very thin (ribeye, strip steak, or pre-sliced cheesesteak beef may be substituted)\n* **1 tablespoon** garlic, finely minced\n* **1 tablespoon** fish sauce\n* **1 tablespoon** soy sauce\n* **1 teaspoon** sugar\n* **½ teaspoon** ground black pepper\n* **2 tablespoons** peanut oil (more as needed for cooking)\n* **5** shallots, thinly sliced (can substitute 1 onion if needed)\n* **4** French baguettes (sandwich size - 8 inches each)\n* **8** lettuce leaves, large leafy type\n* **1 cup** pickled carrot & daikon\n* **4 sprigs** cilantro"}, {"uuid": "gove76ybc6diag3zb6xz64txvi", "title": "Banh Mi (Version 3)", "ainfo": "Beef Banh Mi", "category": "asian", "tags": [], "cookbook": false, "attribution": "", "preview": "1 lb beef sirloin, thinly sliced (makes 4-6 servings)", "notes": "# Beef Banh Mi \n\n### Ingredients\n* **1 lb** beef sirloin, thinly sliced (makes 4-6 servings)\n* **2** garlic cloves, minced\n* **4 tbsp** fish sauce\n* **2 tbsp** sugar\n* **1 tbsp** fresh lime juice\n* **1** red Thai Chili, finely minced\n\n### Instructions\n1. Mix the minced garlic, fish sauce, sugar, lime juice, and minced red Thai chili to create a marinade.\n2. Submerge the thinly sliced beef sirloin in the marinade and let it sit for at least an hour.\n3. Cook by stir-frying or grilling the beef over high heat."}, {"uuid": "iuustxn6ggopjspdob4w7owzxa", "title": "Banh Mi Baguette (2 options)", "ainfo": "Vietnamese Banh Mi Baguettes (The Beth Kitchen Version)", "category": "breads", "tags": [], "cookbook": false, "attribution": "", "preview": "3 ½ cups + 1 Tbsp (503 g) bread flour (12.7% protein - King Arthur Unbleached Bread Flour)", "notes": "# Vietnamese Banh Mi Baguettes (The Beth Kitchen Version)\n\n### Ingredients\n* **3 ½ cups + 1 Tbsp (503 g)** bread flour (12.7% protein - King Arthur Unbleached Bread Flour)\n* **1 ½ tsp (8 g)** kosher salt *(reduce the amount if using regular table salt)*\n* **1 tsp (4 g)** sugar\n* **2 ½ tsp (8.9 g)** instant rise (quick rise) yeast\n* **1 ½ cups (340 - 345 g / 350 ml)** cold water\n* Veg. oil for greasing the counter top and bowl\n\n---\n\n### Instructions\n1. **Prepare Dough:** Mix ingredients to form the dough. Use vegetable oil to grease your countertop and mixing bowl during handling. Ensure all measurements are highly accurate.\n2. **Proofing:** \n   * **Option A (Oven Proof):** Place shaped dough rolls in the oven using a \"Proof\" option for **30-40 minutes**.\n   * **Option B (Standard Rise):** If your oven does not have a proof option, let the dough rolls rise at room temperature for **60-80 minutes** or until doubled in size.\n3. **Oven Setup:** Position your oven rack at the top second shelf. Preheat the oven to **475°F** for at least 5-7 minutes before baking.\n4. **Prep for Bake:** Right before the dough rolls go into the oven, spray water on top of each roll and make 1 slash about 1 cm deep across the top.\n5. **Baking:** \n   * **Standard Method:** Bake baguettes for **22 minutes** or until golden brown. *(Baking times may vary slightly based on your oven's temperature environment).*\n   * **Baking Tray Method:** If using regular baking trays, line 2 trays with parchment paper and place 3 dough rolls on each tray. Bake for **24 minutes total**, switching the trays from top to bottom at the 12-minute mark.\n\n---\n\n# Banh Mi Bread (Aimee's Cooking Version)\n\n### Ingredients\n* **500 g** bread flour\n* **265 ml** water\n* **5 g** bread improver\n* **7 g** yeast\n* **A pinch** of Vitamin C\n* **8 g** salt\n* **6 g** sugar\n* **30 g** butter\n* **1** extra large egg\n\n---\n\n### Instructions\n1. Combine ingredients using proper bread-making and kneading techniques to establish the gluten structure needed for high-quality banh mi.\n2. Shape and prepare the loaves for baking.\n3. Bake at **410°F for 23 minutes** until the crust is crisp and golden."}, {"uuid": "em7atir2c27gh7xowmtgcetvo4", "title": "Barbacoa (Gina)", "ainfo": "Barbacoa (Gina)", "category": "smoked", "tags": [], "cookbook": false, "attribution": "", "preview": "1 Chuck Pot Roast", "notes": "# Barbacoa (Gina)\n\n### Ingredients\n* **1** Chuck Pot Roast\n* **3 cans** Pato Sauce\n* **2 tablespoons** vinegar\n* **1 tablespoon** oregano\n* Garlic, to your liking\n* Salt, to your liking\n\n### Instructions\n1. Place the chuck pot roast into a crockpot.\n2. Add the salt, garlic, vinegar, oregano, and Pato sauce.\n3. Cook on low for 8-10 hours, or until the meat falls apart."}, {"uuid": "ysxwncuycweg73dls53ly36nce", "title": "Beer batter", "ainfo": "Beer batter", "category": "smoked", "tags": ["David Recipes"], "cookbook": false, "attribution": "", "preview": "2 pounds russet potatoes", "notes": "# Beer batter\n\n### Ingredients\n* 2 pounds russet potatoes\n* 2 cups all-purpose flour\n* 1 tablespoon Cajun spice\n* 2 teaspoons garlic salt\n* 2 teaspoons onion powder\n* 2 teaspoons paprika\n* 2 teaspoons kosher salt\n* 1 teaspoon ground black pepper\n* 1 cup lager-style beer, plus additional as needed\n* Peanut oil (or other high smoke point, neutral flavored oil), for frying\n\n### Instructions\n1. Cut potatoes lengthwise into 1/4-inch slices, then cut slices into 1/4-inch sticks. Soak fries in an ice water bath for at least 2 hours, or up to 8 hours.\n2. Mix flour, spices, and beer to create a thick, pancake-like batter, adding more beer if necessary. Divide batter evenly between 2 large mixing bowls. Add potatoes to the batter and toss, making sure to coat each fry completely.\n3. Fill a large cast iron or enamel pot with 3 inches of peanut oil. Heat oil to 325° over medium-high to high heat. \n4. In 2 - 3 batches, add fries and blanch until lightly golden and limp, yet cooked through (takes 4 - 6 minutes). Watch the oil temperature carefully and try to maintain the temperature at 325°. Gently separate the fries while they are cooking; they have a tendency to want to cling to each other. Remove the fries from the oil and allow to cool on a paper towel-lined sheet pan.\n5. Once all of the fries are blanched, raise the oil temperature to 375°. \n6. Dredge the blanched fries in the second bowl of batter, tossing to coat. Still in batches, cook fries until crisp and deep golden brown, about 1 - 2 minutes. \n7. Remove to another paper towel-lined sheet pan, taste-test a fry, and season with additional Cajun seasoning or salt as needed. Serve immediately.", "photos": ["beer-batter.jpg"], "photo": "beer-batter.jpg"}, {"uuid": "mzbzgnxxbe6xpvjbank7hikfwu", "title": "Blackstone Chicken Breast", "ainfo": "Blackstone Chicken Breast", "category": "smoked", "tags": ["David Recipes"], "cookbook": false, "attribution": "", "preview": "2 pounds boneless skinless chicken breast", "notes": "# Blackstone Chicken Breast\n\n### Ingredients\n* 2 pounds boneless skinless chicken breast\n\n#### Marinade\n* ¼ cup mayonnaise\n* ¼ cup avocado oil plus more for the griddle\n* 1 tablespoon Dijon mustard\n* 1 tablespoon soy sauce or gluten-free tamari\n* 1 teaspoon dried thyme or oregano\n* 1 teaspoon sea salt\n* ½ teaspoon fresh ground black pepper\n* ¼ teaspoon cayenne pepper\n\n### Instructions\n1. Place all ingredients in a bowl and stir. \n2. Pour over chicken breast in a ziplock. Let rest in fridge min 4 hours.\n3. Med heat on Blackstone (350F). Cook for 7m and flip. \n4. Cook until IT 160. \n5. Rest 10m in foil."}, {"uuid": "oepg2eo2znwq75yux3xvembtca", "title": "Blackstone Oklahoma Onion Smash Burgers", "ainfo": "Blackstone Oklahoma Onion Burgers", "category": "smoked", "tags": ["David Recipes"], "cookbook": false, "attribution": "", "preview": "80/20 hamburger meat (rolled into loose balls, around ¼ cup or 2.5-2.75oz each)", "notes": "# Blackstone Oklahoma Onion Burgers\n\n### Ingredients\n* 80/20 hamburger meat (rolled into loose balls, around ¼ cup or 2.5-2.75oz each)\n* Yellow onion, thinly sliced\n* Salt\n* Hamburger buns\n* Mayo\n* Cheese slices\n\n#### Seasoning\n* **1½T** black pepper\n* **1t** garlic powder\n* **1t** onion powder\n* **1t** Knorr beef powder\n* **½t** Lawry's seasoned salt\n\n### Instructions\n1. Thinly slice the onion, toss with salt, and let sit for 15 minutes. Strain out the excess liquid.\n2. Heat your Blackstone griddle to a high heat (400°F+).\n3. Coat the top and bottom buns with mayo and toast them on the griddle; set aside.\n4. Place a loose ball of hamburger meat onto the hot griddle, then pile a generous handful of the strained onions directly on top of the meat.\n5. Use a burger press to push down hard on the onions and meat for 10 seconds. Sprinkle the seasoning blend over the patty.\n6. Flip the burger after the meat color changes to a light pink on the edges.\n7. Add a slice of cheese over the onions, place the top bun directly over the cheese, and pull from the griddle once the cheese is completely melted."}, {"uuid": "ilmqdrbluqo4bxgdr6trcfs7oq", "title": "Blackstone Philly Cheesesteak", "ainfo": "Blackstone Philly Cheesesteak", "category": "smoked", "tags": ["David Recipes"], "cookbook": false, "attribution": "", "preview": "Ribeye steaks", "notes": "# Blackstone Philly Cheesesteak\n\n### Ingredients\n* Ribeye steaks\n* Onions\n* Peppers\n* Rolls\n* Mayo or Miracle Whip\n* American Cheese\n* Provolone Cheese\n\n#### Seasoning\n* **2T** Knorr beef powder\n* **1t** Salt\n* **1T** Pepper\n* **1t** Onion powder\n* **1t** Garlic Powder\n\n### Instructions\n1. Put the ribeye steaks in the freezer for 30 minutes before cutting them into thin ribbons.\n2. Mix the seasoning ingredients together (Knorr beef powder, salt, pepper, onion powder, garlic powder) and use to season the meat during cooking on the griddle with the onions and peppers. Assemble on rolls with mayo/Miracle Whip, American cheese, and Provolone cheese."}, {"uuid": "qrtcuyzmn3rw43dwyzutcizbi4", "title": "Blackstone Street Tacos", "ainfo": "Blackstone Street Tacos", "category": "smoked", "tags": ["David Recipes"], "cookbook": false, "attribution": "", "preview": "2 lbs of chuck steak, cubed", "notes": "# Blackstone Street Tacos\n\n### Ingredients\n* **2 lbs** of chuck steak, cubed\n* Salt, pepper, and garlic powder to taste\n* Juice of **1** lemon\n* Corn tortillas\n* Salsa\n* Chopped onion and cilantro mix\n* Additional lemon juice (for serving)\n\n### Instructions\n1. Season the cubed chuck steak with salt, pepper, and garlic powder to taste, and the juice of 1 lemon.\n2. Cook on the Blackstone over medium-high heat, keeping the juices on the meat.\n3. When the meat is golden brown, move it to the cold side of the griddle.\n4. Toast the corn tortillas on the Blackstone.\n5. Assemble the tacos by topping the toasted tortillas with the steak, salsa, chopped onion and cilantro mix, and a squeeze of lemon juice."}, {"uuid": "5aondqsbopzpukwkbw6hdmtgq4", "title": "Blueberry Lemon Sourdough Loaf", "ainfo": "Blueberry Lemon Sourdough Loaf", "category": "sourdough", "tags": [], "cookbook": false, "attribution": "", "preview": "100g starter", "notes": "# Blueberry Lemon Sourdough Loaf\n\n### Ingredients\n* **100g** starter\n* **350g** water\n* **10g** salt\n* **500g** King Arthur bread flour\n* Blueberries and lemon zest (to preference for filling/layering)\n\n### Instructions\n1. Combine the starter, water, salt, and bread flour to create the base dough (yields a ~900g loaf).\n2. Incorporate the blueberries and lemon elements during the lamination or shaping process before the final proof and bake."}, {"uuid": "puqc6ya764r55ix2ptyigzrx7m", "title": "Bruschetta Chicken Pasta", "ainfo": "Bruschetta Chicken Pasta", "category": "mains", "tags": [], "cookbook": false, "attribution": "", "preview": "8 oz pasta (linguine or fettuccine)", "notes": "# Bruschetta Chicken Pasta\n\n### Ingredients\n* **8 oz** pasta (linguine or fettuccine)\n* **1 lb** boneless, skinless chicken breasts, cut into bite-sized pieces\n* **1 cup** cherry tomatoes, halved\n* **¼ cup** fresh basil, chopped\n* **2 cloves** garlic, minced\n* **¼ cup** olive oil\n* **2 tbsp** balsamic vinegar\n* **Salt and pepper**, to taste\n* **Grated Parmesan cheese**, for serving (optional)\n\n### Instructions\n1. Cook pasta al dente, then set aside.\n2. In a large skillet, sauté chicken, cherry tomatoes, garlic, and basil in olive oil until chicken is cooked through.\n3. Stir in balsamic vinegar and season with salt and pepper.\n4. Combine cooked pasta and chicken mixture. Toss to combine.\n5. Serve hot, topped with grated Parmesan cheese (if desired)."}, {"uuid": "towlqumkmrh55qdxhkqjftv7um", "title": "Burger Buns Recipe", "ainfo": "Burger Buns Recipe", "category": "breads", "tags": [], "cookbook": false, "attribution": "", "preview": "1 cup (236 ml) water", "notes": "# Burger Buns Recipe\n\n### Ingredients\n* **1 cup (236 ml)** water\n* **¼ cup (60 ml)** whole milk\n* **2 ½ teaspoons** active dry yeast\n* **2 Tablespoons** granulated sugar plus a pinch for activating the yeast\n* **5 Tablespoons** unsalted butter, melted\n* **1 large egg + 1 large egg yolk**, lightly beaten, room temperature preferred (save the white for brushing on top)\n* **1 ¼ teaspoons** salt\n* **4 cups (500 g)** bread flour, plus additional as needed (up to ½ cup additional or more)\n* **1 ½ teaspoons** cornmeal (optional)\n* **Sesame seeds** for sprinkling (optional)\n\n### Instructions\n\n1. Combine water and milk in a microwave-safe bowl and heat to 105-115°F (40-46°C). Be sure to stir before checking the temperature as sometimes the microwave heats unevenly.\n2. Pour warmed water/milk into a large bowl (or you may use a stand mixer) and add yeast and a generous pinch (about 1 teaspoon) of granulated sugar. Stir briefly and allow mixture to sit until foamy (about 5-10 minutes). If yeast does not become foamy, it may be dead or your liquid may have been too hot or not hot enough. You will need to discard and start over.\n3. Once yeast is foamy, add 2 Tablespoons granulated sugar, melted butter, egg, egg yolk, and salt. Stir until well-combined. Gradually add flour and stir (use a spatula or wooden spoon or the dough hook attachment on your mixer) until you have a soft, slightly sticky/tacky, but still manageable dough. Scrape down the sides and bottom of the bowl as needed.\n4. Transfer the dough to a clean, lightly floured surface and knead for several minutes until you have a smooth, elastic ball. If dough is too sticky to manage you may add more flour, but do so sparingly. You want the dough to be somewhat sticky! (If using a stand mixer, you can knead with the dough hook and your mixer on a medium-low speed for several minutes.)\n5. Transfer dough to a large, clean, lightly oiled bowl, turn to coat the dough with oil. Cover with plastic wrap and let rise until doubled (this could take 1-2 hours depending on the temperature of your kitchen).\n6. After rising, gently deflate the dough and transfer to a lightly floured surface. Divide into 8 even pieces (by forming the dough into a ball, dividing the dough in half, and repeating until you have 8 even pieces). Form each piece into a smooth ball.\n7. Line a standard-sized cookie or baking sheet with parchment paper, dust the parchment lightly with cornmeal (this will keep the rolls from sticking), then transfer rolls to prepared sheet, spacing them evenly. Cover lightly with plastic wrap and let rise until increased in size 50%. Meanwhile, preheat oven to 375°F (190°C)."}, {"uuid": "26b2pmjexcvomqrnh36gjc6dri", "title": "Bread Crumb Proofing Visual Diagram", "ainfo": "How to Read a Sourdough Crumb — The Sourdough Journey", "category": "reference", "tags": ["reference"], "cookbook": false, "attribution": "", "preview": "Source: The Sourdough Journey", "notes": "# How to Read a Sourdough Crumb\n*Source: The Sourdough Journey*\n\nUse this guide to diagnose your sourdough loaf by examining the crumb (interior) after slicing.\n\n### Underproofed\n* **Badly Underproofed** — Dense, gummy crumb\n* **Underproofed** — Dense crumb, tunneling\n* **Underproofed** — Spongy crumb and caverns\n* **Underproofed** — Dense areas and giant holes\n* **Slightly Underproofed** — Pyramidal shape with tunneling\n\n### Nicely Proofed\n* **Nicely Proofed** — Sightly closed crumb\n* **Nicely Proofed** — Open, Irregular Crumb\n* **Nicely Proofed** — Molten Crumb\n* **Nicely Proofed** — Wild Crumb\n\n### Overproofed\n* **Fully Proofed** — Somewhat tight crumb\n* **Slightly Overproofed** — Nice crumb but losing shape\n* **Significantly Overproofed** — Dense crumb and flat shape", "image": "crumb-diagram.jpg"}, {"uuid": "5dll5b24mpzzpykes4xjavjfmy", "title": "Carolina Mustard BBQ Sauce (Gold Barbecue Sauce)", "ainfo": "Carolina Mustard BBQ Sauce (Gold Barbecue Sauce)", "category": "sauces", "tags": [], "cookbook": false, "attribution": "", "preview": "¾ cup yellow mustard", "notes": "# Carolina Mustard BBQ Sauce (Gold Barbecue Sauce)\n\n### Ingredients\n* **¾ cup** yellow mustard\n* **½ cup** apple cider vinegar\n* **½ cup** honey\n* **1 teaspoon** Worcestershire sauce\n* **2 tablespoon** ketchup\n* **1 teaspoon** garlic powder\n* **1 tablespoon** red pepper flakes\n* **½ teaspoon** salt\n* **2 tablespoon** brown sugar\n\n### Instructions\n1. Combine yellow mustard, apple cider vinegar, honey, Worcestershire sauce, ketchup, garlic powder, red pepper flakes, salt, and brown sugar in a saucepan.\n2. Mix well. Cook on low heat, stirring continuously to prevent scorching, for 5 to 7 minutes.\n3. Cool completely, then pour into a jar. Keep refrigerated until ready to serve.\n\n_Note: Add 1 tablespoon of red pepper flakes to give it a little kick_"}, {"uuid": "mhfeuo3n2e2aahvaawqkzrlfx4", "title": "Cheese Cake", "ainfo": "Cheese Cake", "category": "desserts", "tags": [], "cookbook": true, "attribution": "Thu", "preview": "Thu's Recipe Prepared", "notes": "## Cheese Cake\n*Thu's Recipe Prepared*\n\n### Details\n* **Oven Temp:** Preheat oven to 350°F\n\n### Things You Need\n\n#### Outer Crust\n* 2 cups graham cracker crumbs\n* 1 stick of butter, melted\n\n#### Filling\n* 2 packages of 8 oz cream cheese (all but 1/2 inch of one package)\n* 3/4 cup granulated sugar\n* 1 tsp vanilla\n* 3 eggs (added one at a time)\n\n#### Topping\n* Comstock Cherry Pie filling\n\n### Directions\n1. Combine the graham cracker crumbs with the melted butter to line the cheesecake pan, packing it loosely.\n2. Mix the filling ingredients thoroughly, adding the eggs one at a time, and pour the mixture into the prepared crust.\n3. Cook for 30–40 minutes, then remove from the oven and let cool completely.\n4. Add the cherry pie filling on top once the cheesecake is cold."}, {"uuid": "icggixhwvwqeibha6d4hoau4ge", "title": "Chicken Pho", "ainfo": "Chicken Pho", "category": "asian", "tags": [], "cookbook": true, "attribution": "", "preview": "Chicken broth starter", "notes": "## Chicken Pho\n\n### Broth Base & Aromatics\n* Chicken broth starter\n* 3 chunks of ginger, peeled\n* 2–3 sweet onions, cut in half\n* 3 carrots, peeled and cut in half\n\n### Spices (in Cheese Cloth)\n* Star Anise\n* Dried amomum tsao-ko\n* Cloves\n* Peppercorns\n* Cinnamon sticks\n\n### Served in Bowl\n* Pho noodles\n* Boiled chicken breast\n* Pickled onions\n\n### On the Side / Garnishes\n* Cilantro\n* Thai Basil\n* Mint\n* Bean Sprouts\n* Lime\n* Sriracha / black pepper\n* Cilantro / green onion (chopped)\n* Jalapeno\n* Pho Broth"}, {"uuid": "io3f7rqq5kyikjx2t3w5ogwyae", "title": "Creamy Garlic Butter Chicken and Rigatoni in Parmesan Sauce", "ainfo": "Creamy Garlic Butter Chicken and Rigatoni in Parmesan Sauce", "category": "mains", "tags": [], "cookbook": false, "attribution": "", "preview": "1 lb boneless, skinless chicken breasts, cut into bite-sized pieces", "notes": "# Creamy Garlic Butter Chicken and Rigatoni in Parmesan Sauce\n\n### Ingredients\n* **1 lb** boneless, skinless chicken breasts, cut into bite-sized pieces\n* **3 tablespoons** butter\n* **3 cloves** garlic, minced\n* **1 cup** chicken broth\n* **1 cup** heavy cream\n* **1 cup** grated Parmesan cheese\n* **12 oz** rigatoni pasta\n* **1 teaspoon** Italian seasoning\n* **½ teaspoon** salt\n* **¼ teaspoon** black pepper\n* **1 tablespoon** fresh parsley, chopped (for garnish)\n\n### Instructions\n1. **Cook Pasta:** Cook the rigatoni pasta according to package instructions, then drain and set aside.\n2. **Sear Chicken:** In a large skillet, melt 2 tablespoons of butter over medium heat. Add the chicken pieces and season with salt, pepper, and Italian seasoning. Cook the chicken for 6–8 minutes until golden and cooked through. Remove the chicken from the skillet and set aside.\n3. **Sauté Garlic:** In the same skillet, add the remaining tablespoon of butter and the minced garlic. Sauté for about 1 minute until fragrant.\n4. **Simmer Sauce:** Pour in the chicken broth, stirring to combine, and bring to a simmer. Let it cook for 3–4 minutes to reduce slightly.\n5. **Thicken Sauce:** Add the heavy cream and Parmesan cheese, stirring until the sauce becomes smooth and creamy. Let it simmer for 2–3 minutes.\n6. **Combine and Serve:** Add the cooked chicken back to the skillet, followed by the cooked rigatoni pasta. Toss to combine and coat the pasta and chicken in the creamy sauce. Garnish with fresh parsley and serve immediately."}, {"uuid": "4odb4cc4jsvbkkjvz5vnyrgknq", "title": "Dessert Pizza", "ainfo": "Dessert Pizza", "category": "desserts", "tags": [], "cookbook": false, "attribution": "", "preview": "Preheat oven to 450°F. Roll out pizza dough and curl up edges to make a crust.", "notes": "# Dessert Pizza\n\n### Instructions\n1. Preheat oven to 450°F. Roll out pizza dough and curl up edges to make a crust.\n2. Brush middle of pizza dough with melted butter and sprinkle with sugar. Bake for about 8 minutes or until golden brown.\n3. Remove from oven and spread lemon curd on pizza crust. Bake two more minutes.\n4. Allow crust to cool slightly. In the meantime, beat together mascarpone cheese, powdered sugar and vanilla extract. Once pizza has cooled, spread on top of lemon curd.\n5. Spread as many raspberries as you want on top of the mascarpone cheese mixture. Sprinkle entire pizza with powdered sugar. Serve immediately."}, {"uuid": "lsojvs7fmwx575i36ku7cg6apq", "title": "DoubleTree by Hilton Cookie Recipe", "ainfo": "DoubleTree by Hilton Cookie Recipe", "category": "desserts", "tags": [], "cookbook": false, "attribution": "", "preview": "½ pound butter, softened (2 sticks)", "notes": "# DoubleTree by Hilton Cookie Recipe\n\n### Ingredients\n* **½ pound** butter, softened (2 sticks)\n* **¾ cup + 1 tablespoon** granulated sugar\n* **¾ cup** packed light brown sugar\n* **2** large eggs\n* **1 ¼ teaspoons** vanilla extract\n* **¼ teaspoon** freshly squeezed lemon juice\n* **2 ¼ cups** flour\n* **½ cup** rolled oats\n* **1 teaspoon** baking soda\n* **1 teaspoon** salt\n* **Pinch** cinnamon\n* **2 ⅔ cups** Nestle Tollhouse semi-sweet chocolate chips\n* **1 ¾ cups** chopped walnuts\n\n### Instructions\n1. Cream butter, sugar, and brown sugar in the bowl of a stand mixer on medium speed for about 2 minutes.\n2. Add eggs, vanilla, and lemon juice, blending with mixer on low speed for 30 seconds, then medium speed for about 2 minutes, or until light and fluffy, scraping down the bowl.\n3. With mixer on low speed, add flour, oats, baking soda, salt, and cinnamon, blending for about 45 seconds. Don't overmix.\n4. Remove bowl from mixer and stir in chocolate chips and walnuts.\n5. Portion dough with a scoop (about 3 tablespoons) onto a baking sheet lined with parchment paper about 2 inches apart.\n6. Preheat oven to 300°F. Bake for 20 to 23 minutes, or until edges are golden brown and center is still soft."}, {"uuid": "3bv2yy32colpjblxpkv5b5u4ou", "title": "Filipino Chicken Adobo (Reddit Version 1)", "ainfo": "Filipino Chicken Adobo (Reddit Version 1)", "category": "asian", "tags": [], "cookbook": false, "attribution": "", "preview": "5-6 pieces of chicken (dark meat preferred)", "notes": "# Filipino Chicken Adobo (Reddit Version 1)\n\n### Ingredients\n* **5-6 pieces** of chicken (dark meat preferred)\n* **2 tablespoons** neutral oil\n* **1 head** of garlic, minced\n* **1 cup** water (plus more if needed)\n* **½ cup** of soy sauce\n* **½ cup** of white vinegar (preferably Datu Puti brand)\n* **2-3** bay leaves\n* **1 teaspoon** whole black peppercorns\n* **Salt & fresh cracked pepper** to taste\n\n### Instructions\n1. In a heavy braising pan or pot, heat the oil at medium heat. While the oil is heating, dry the chicken pieces as best as you can.\n2. Once the oil is slightly smoking, fry chicken pieces being careful not to overcrowd the pan/pot. Fry in batches as needed. Set aside.\n3. In the same pan with the heat on low, toast the peppercorns and bay leaves. Once fragrant, add the minced garlic. Fry garlic until lightly browned, don't burn!\n4. Add back the chicken, soy sauce, and water. If the liquid is not enough to cover the chicken, add a bit more water until the chicken is just covered with liquid.\n5. Increase heat to medium-high until it begins to boil."}, {"uuid": "6gxcgzi3fefq655ejhqeqguzpe", "title": "Filipino Chicken Adobo (The Kitchn Version)", "ainfo": "Filipino Chicken Adobo (The Kitchn Version)", "category": "asian", "tags": [], "cookbook": false, "attribution": "", "preview": "5 cloves garlic", "notes": "# Filipino Chicken Adobo (The Kitchn Version)\n\n### Ingredients\n* **5 cloves** garlic\n* **3 pounds** bone-in chicken thighs, drumsticks, or a combination\n* **½ teaspoon** kosher salt\n* **1 tablespoon** neutral oil, such as canola\n* **3** dried bay leaves\n* **2 teaspoons** whole black peppercorns\n* **2 cups** water\n* **½ cup** soy sauce, preferably a Filipino brand like Silver Swan\n* **⅓ cup** cane vinegar\n* **3 tablespoons** oyster sauce\n* **Steamed white rice**, for serving\n\n### Instructions\n1. **Prepare the Chicken and Garlic:** Smash and peel 5 garlic cloves. Pat chicken dry with paper towels. Season all over with ½ teaspoon kosher salt.\n2. **Sear the Chicken:** Heat 1 tablespoon neutral oil in a Dutch oven or large heavy-bottomed pot over medium-high heat until shimmering. Working in 2 batches, add the chicken to the pot (skin-side down if using thighs). Sear until browned on all sides, about 6 minutes per batch (reduce the heat as needed if starting to burn). Transfer to a plate.\n3. **Sauté Aromatics and Simmer:** Place the garlic, 3 dried bay leaves, and 2 teaspoons whole black peppercorns in the pot. Stir until the garlic cloves and peppercorns are slightly toasted and fragrant, 30 seconds to 1 minute. Add 2 cups water, ½ cup soy sauce, ⅓ cup cane vinegar, and 3 tablespoons oyster sauce. Scrape up any browned bits from the bottom of the pot with a wooden spoon.\n4. **Reduce and Prep Broiler:** Return the chicken and any accumulated juices to the pot, arranging in a single layer (skin-side down if using thighs). Bring to a boil. Reduce heat to maintain a simmer. Cook uncovered until the chicken registers at least 165°F in the thickest part, flipping each piece halfway through, about 20 minutes total. When almost ready, arrange a rack in the upper-third of the oven and heat to broil. Line a rimmed baking sheet with aluminum foil.\n5. **Broil Chicken and Finish Sauce:** Transfer chicken (skin-side up) to the baking sheet. Continue to let the sauce simmer on the stove. Broil until browned on top, about 3 minutes. Flip each piece and brush with sauce from the pot. Return to oven and broil until browned on the second side, about 3 minutes more. Remove and discard bay leaves if desired. Serve with steamed white rice and drizzle heavily with the sauce."}, {"uuid": "rujfpye4o2zlnup25o73pg4qae", "title": "Fish Sauce", "ainfo": "Fish Sauce", "category": "sauces", "tags": [], "cookbook": true, "attribution": "Thu", "preview": "Thu's Recipe Prepared", "notes": "## Fish Sauce\n*Thu's Recipe Prepared*\n\n### Things You Need\n* 1/3 cup fish sauce\n* 2/3 cup filtered water\n* 1/3 cup granulated sugar\n* 1/2 to 1 1/3 cup vinegar\n* 3 cloves garlic, smashed\n* Pepper flakes\n* Lemon juice\n* Sriracha"}, {"uuid": "ekabi2s6vgiq3fxc3cuzbiixua", "title": "French Onion Soup", "ainfo": "French Onion Soup (Soupe à l'Oignon Gratinée)", "category": "mains", "tags": [], "cookbook": false, "attribution": "", "preview": "6 tablespoons (90g) unsalted butter, plus more for bread", "notes": "# French Onion Soup (Soupe à l'Oignon Gratinée) Recipe\n\n### Ingredients\n* **6 tablespoons (90g)** unsalted butter, plus more for bread\n* **3 pounds (1.4kg)** yellow or mixed onions, sliced 1/8 inch thick\n* **Kosher salt and freshly ground black pepper** to taste, divided\n* **½ cup (120ml)** dry sherry (such as Amontillado)\n* **2 quarts (1.8L)** homemade or store-bought low-sodium chicken stock\n* **2 sprigs** thyme\n* **1** bay leaf\n* **1 teaspoon (5ml)** Asian fish sauce (optional)\n* **1 teaspoon (5ml)** cider vinegar\n* **8** bowl-size slices rustic bread, toasted until crisp\n* **1 medium clove** garlic\n* **1 pound (450g)** Gruyère cheese, grated\n* **2 tablespoons** freshly minced chives, for garnish"}, {"uuid": "zhvf67pfyvu5qchcdl6skfehse", "title": "Fresh Basil Pesto", "ainfo": "Fresh Basil Pesto (Simply Recipes Version)", "category": "sauces", "tags": [], "cookbook": false, "attribution": "", "preview": "2 cups fresh basil leaves, packed (can sub half the basil leaves with baby spinach)", "notes": "# Fresh Basil Pesto (Simply Recipes Version)\n\n### Ingredients\n* **2 cups** fresh basil leaves, packed (can sub half the basil leaves with baby spinach)\n* **½ cup** freshly grated Romano or Parmesan cheese (about 2 ounces)\n* **½ cup** extra virgin olive oil\n* **⅓ cup** pine nuts (can sub chopped walnuts)\n* **3 cloves** garlic, minced (about 1 tablespoon)\n* **¼ teaspoon** salt, or more to taste\n* **⅛ teaspoon** freshly ground black pepper, or more to taste\n\n### Instructions\n1. Pulse basil and pine nuts in a food processor..."}, {"uuid": "sk2haayzn23wm2squzc5xovjoa", "title": "Fresh Pasta Flour-to-Egg Ratio", "ainfo": "Fresh Pasta Flour-to-Egg Ratio", "category": "reference", "tags": ["reference"], "cookbook": false, "attribution": "", "preview": "1.64g flour for every 1g of egg", "notes": "# Fresh Pasta Flour-to-Egg Ratio\n\n### Formula\n* **1.64g** flour for every **1g** of egg"}, {"uuid": "qltgpklrg4byt5ezryqysviham", "title": "Fruit Salad Dressing", "ainfo": "Fruit Salad Dressing", "category": "sides", "tags": [], "cookbook": false, "attribution": "", "preview": "2 tbsp. cornstarch", "notes": "# Fruit Salad Dressing\n\n### Ingredients\n* **2 tbsp.** cornstarch\n* **⅔ cup** sugar\n* **1** egg\n* Juice of **1 (#2) can** of chunk pineapple\n* **1 tbsp.** butter\n\n### Instructions\n1. **Make the Dressing:** Mix cornstarch and sugar. Add beaten egg and juice of pineapple. Cook until very thick. Remove from heat, add butter and let cool in refrigerator.\n2. **Assemble the Salad:** Drain one large fruit cocktail, add pineapple chunks, bananas, and marshmallows. Add cooled dressing. Add whipped cream that you have whipped adding sugar and a teaspoon of vanilla. Mix altogether and chill."}, {"uuid": "5s7xp4lzj2f66dzlnt7cyroyvy", "title": "Garlic Naan", "ainfo": "Homemade Garlic Naan (Spice Up The Curry Version)", "category": "breads", "tags": [], "cookbook": false, "attribution": "", "preview": "1 tsp Chilli flakes, Red", "notes": "# Homemade Garlic Naan (Spice Up The Curry Version)\n\n### Ingredients\n* **1 tsp** Chilli flakes, Red\n* **3 tbsp** Cilantro or coriander\n* **5 tbsp** Garlic\n* **½ packet** Active dry yeast\n* **2 ¼ cups** All purpose flour\n* **¼ tsp** Baking powder\n* **½ tsp** Salt\n* **1 tsp** Sugar\n* **1 tbsp** Oil\n* **2 tbsp** Butter\n* **⅓ cup** Milk\n* **⅓ cup** Yogurt, Plain\n* **2 tbsp** Water", "photos": ["garlic-naan.jpg"], "photo": "garlic-naan.jpg"}, {"uuid": "76ma4u4lpv6gjlr7obods2ptxe", "title": "Hollandaise", "ainfo": "Hollandaise", "category": "sauces", "tags": [], "cookbook": true, "attribution": "Grandma Marty", "preview": "Grandma Marty's Recipe Prepared", "notes": "## Hollandaise\n*Grandma Marty's Recipe Prepared*\n\n### Things You Need\n* 1 stick of butter, melted\n* 2 egg yolks\n* 1/2 tsp salt\n* Cayenne pepper\n* Lemon juice\n\n### Directions\n1. Beat the egg yolks at high speed until they reach a pale, lemon-colored consistency.\n2. Add the salt and a dash of cayenne pepper.\n3. While continuously beating, slowly incorporate a small amount of lemon juice and approximately 3 tbsp of melted butter at a time.\n4. Refrigerate promptly after preparation."}, {"uuid": "62lj6aixf5tn2ammrsqtlizynq", "title": "Homemade Baking Powder", "ainfo": "Homemade Baking Powder", "category": "reference", "tags": ["reference"], "cookbook": false, "attribution": "", "preview": "1 cup cream of tartar", "notes": "# Homemade Baking Powder\n\n### Ingredients\n* **1 cup** cream of tartar\n* **½ cup** baking soda\n* **¼ cup** cornstarch"}, {"uuid": "usz6a7m7nsdn2ol2fhxk6ody7q", "title": "Homemade Mozzarella Cheese", "ainfo": "2-Ingredient Homemade Mozzarella Cheese (Without Rennet)", "category": "mains", "tags": [], "cookbook": false, "attribution": "", "preview": "White distilled vinegar", "notes": "# 2-Ingredient Homemade Mozzarella Cheese (Without Rennet)\n\n### Ingredients\n* **Milk**\n* **White distilled vinegar**\n* **Salt** (optional, to taste)\n\n---\n\n### Instructions\n\n1. **Heat the Milk:** Pour the milk into a large pot and place it on the stovetop burner. Set the heat between medium-low and medium. Gently keep stirring the milk so it heats evenly and reaches right around **115°F / 46°C**.\n2. **Add Vinegar:** Turn off the heat and add in the vinegar. Stir for about **30 seconds** so it evenly mixes in with the milk. It will start to curdle almost immediately.\n3. **Rest:** Add a lid to the pot and allow it to sit undisturbed for **15 to 20 minutes**.\n4. **Gather Curds:** Gather the curd by taking a spoon or spatula and bringing the curd to the side against the pot. Fish around in the whey to collect any extra hanging curds.\n5. **Separate:** Remove the curd from the whey and place it into a bowl.\n6. **Express Excess Whey:** Using very clean hands or wearing gloves, grab the curd, cup it in your hands, and gently squeeze. Allow the extracted whey to fall into the bowl, then discard it back into the main pot of whey.\n7. **Knead and Season:** Keep repeating this squeezing process several times, using a bit more force each time. Place the curd back in the bowl and knead it a bit. If you want to add salt, mix it in at this time.\n8. **Heat the Cheese:** \n   * **Microwave Method:** Place the pressed ball of cheese into a microwave-safe bowl. Heat on **high for about 30 seconds**, then check the temperature. Stir and heat again for about **20 seconds** until the internal temperature reaches **160°F / 71°C**.\n   * **Stovetop Whey Method (Alternative):** Heat the reserved whey in the pot to **170°F** and soak and stretch the cheese directly in that.\n9. **Stretch and Fold:** After the cheese hits the proper temperature, start stretching and folding with a spoon (it will be hot). Pour any leftover liquid back into the pot. Switch to using your hands once it cools down enough to handle safely.\n10. **Shape and Ice Chill:** Shape the smooth cheese into a uniform ball and place it into a bowl of cool water for about **10 minutes**. Then add ice to further chill the cheese.\n11. **Store or Serve:** Pat the cheese completely dry with a paper towel. Eat immediately, or wrap tightly in plastic wrap and store in the fridge for **1 to 2 weeks**.\n\n*Note: Grating works much better when the cheese is chilled entirely cold or slightly frozen.*"}, {"uuid": "nb6f6pqpzdlgrdlw6bv6ppvpvi", "title": "Indonesian Noodles", "ainfo": "Indonesian Noodles", "category": "asian", "tags": [], "cookbook": true, "attribution": "Miranda", "preview": "Miranda's Recipe", "notes": "## Indonesian Noodles\n*Miranda's Recipe*\n\n### Things You Need\n\n#### Sauce\n* 1 tbsp Kecap manis\n* 1 tbsp Sambal oelek\n* 1 tbsp Oyster Sauce\n* 1 tsp soy sauce\n* 1/2 cup chicken stock\n* Green onion, garlic\n* Vegetable seasoning\n\n#### Other Ingredients\n* 2 squares Top Ramen Noodles\n* 1 chicken breast, cut into pieces\n* 3–4 carrots, thinly sliced (using a vegetable peeler)\n* Bok Choy, chopped\n* Onions\n* Red bell pepper\n* Garnish: Green onions and a fried egg\n\n### Directions\n1. Marinate the raw chicken pieces in a small amount of the prepared sauce. Save the rest of the sauce for later stages of cooking.\n2. Boil the ramen noodles briefly until just al dente. Rinse immediately with cold water to cool.\n3. Saute the onions, garlic, and red bell pepper in a wok, then add the marinated raw chicken. Cook through and remove everything from the wok.\n4. Next, saute the carrots and chopped bok choy in the wok. Add vegetable seasoning and a small amount of the sauce, then remove them from the wok.\n5. Fry the noodles in the wok with the remainder of the sauce, then toss the cooked chicken and vegetables back in to combine.\n6. Top with green onions and a freshly fried egg before serving."}, {"uuid": "bjqhaeq2dxfgr3vyot45zmogai", "title": "Jalapeño Butter Corn on the Cob", "ainfo": "Jalapeño Butter Corn on the Cob", "category": "sides", "tags": [], "cookbook": false, "attribution": "", "preview": "Corn on the cob", "notes": "# Jalapeño Butter Corn on the Cob\n\n### Ingredients\n* Corn on the cob\n* Water (for boiling)\n* **1 stick** butter\n* **2 tablespoons** honey\n* **1 cup** milk (or ½ cup half and half)\n* **2** sliced jalapeños\n\n### Instructions\n1. Bring water to a boil.\n2. Add 1 stick of butter, 2 tablespoons of honey, and 1 cup of milk (or ½ cup half and half) to the boiling water and blend together.\n3. Carefully add the corn and 2 sliced jalapeños.\n4. After adding the corn, turn the heat to low and let cook for 5–7 minutes.\n5. Turn off the heat and keep covered until ready to serve."}, {"uuid": "uubyxcwb46zsnxjg4lzrgqcx7y", "title": "Lobster Artichoke Dip", "ainfo": "Lobster Artichoke Dip", "category": "mains", "tags": [], "cookbook": false, "attribution": "", "preview": "8 oz cream cheese (softened)", "notes": "# Lobster Artichoke Dip\n\n### Ingredients\n* **8 oz** cream cheese (softened)\n* **1 cup** mayonnaise\n* **14 oz** artichoke hearts (1 14oz can, quartered, sliced, chopped)\n* **1 tablespoon** garlic (minced)\n* **¾ cup** Parmesan cheese (reserve about 2 tablespoons for sprinkling on top)\n* **¼ cup** Romano cheese\n* **1 cup** lobster meat (cooked, chopped)\n* **½ teaspoon** smoked paprika\n* **Salt & pepper** (to taste)\n\n### Instructions\n1. Preheat your oven to 350°F (175°C).\n2. In a medium mixing bowl, break up the 8 oz cream cheese and stir until smooth and creamy enough to blend well with the remaining ingredients.\n3. Add 1 cup mayonnaise and stir until well blended, then add the chopped artichoke hearts, garlic, Parmesan, and Romano cheese. Season with salt & pepper. Stir to combine.\n4. Fold in diced lobster meat, just enough to distribute throughout the dip without breaking up the meat.\n5. Transfer the dip to a small casserole dish, sprinkle with smoked paprika, and bake at 350°F for 20–25 minutes. The edges should bubble lightly and the top should brown slightly.\n6. Remove from the oven and allow to cool slightly, about 5 minutes, before serving warm."}, {"uuid": "lyiujeexujb2lhwkhswc4tlyoi", "title": "Maple Roasted Carrots with Rosemary", "ainfo": "Maple Roasted Carrots with Rosemary", "category": "sides", "tags": ["David Recipes"], "cookbook": false, "attribution": "", "preview": "Serves 4 as a side", "notes": "# Maple Roasted Carrots with Rosemary\n\n### Ingredients\n* Serves 4 as a side\n* Olive oil\n* 10oz (300g) carrots, cleaned, trimmed & halved lengthwise\n* 3 sprigs rosemary\n* 3 tbsp maple syrup\n* Sea salt\n\n### Method\n1. Fire up your Ooni pizza oven. Aim for 390°F (200°C) on the stone baking board inside.\n2. Add a little olive oil and one sprig of rosemary to your Sizzler and place inside the oven to warm up.\n3. Once the pan is warm, add the carrots and the remaining rosemary, and drizzle with a little more olive oil. Return the pan to the oven and cook for 10 minutes, or until the carrots are golden brown and softened.\n4. Drizzle the maple syrup over the carrots and continue cooking for another 2-3 minutes, or until the carrots are caramelized.\n5. Remove the pan from the oven and sprinkle the carrots generously with the sea salt. The carrots can be served right from the pan."}, {"uuid": "pl2i5452m6cbvcxmusv2kqaxtq", "title": "Moser Sweet Pickle", "ainfo": "Grandma's Pickle Recipe", "category": "sauces", "tags": [], "cookbook": false, "attribution": "", "preview": "Sliced dill pickles (buy the sliced if available, if not they will need to be sliced)", "notes": "# Grandma's Pickle Recipe\n\n### For 1 Gallon Jar of Pickles\n\n#### Ingredients\n* Sliced dill pickles (buy the sliced if available, if not they will need to be sliced)\n* **4 lbs** of Sugar\n* **7** Cinnamon Sticks, medium to long length\n* **2-3 tb
